<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Clara — Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;--coral:#D85A30;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;--white:#FFFFFF;--r:20px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:100px;}

/* TOP */
.topbar{background:var(--teal);padding:52px 20px 24px;position:relative;overflow:hidden;}
.topbar::after{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.07);}
.topbar-title{font-family:'Lora',serif;font-size:24px;font-weight:600;color:white;position:relative;z-index:1;}
.topbar-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;position:relative;z-index:1;}
.topbar-actions{position:absolute;top:16px;right:16px;display:flex;gap:8px;z-index:2;}
.icon-btn{width:38px;height:38px;border-radius:99px;background:rgba(255,255,255,.15);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* FILTER TABS */
.tabs{display:flex;gap:0;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;font-family:'DM Sans',sans-serif;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}

/* STOCK BANNER */
.banner{margin:16px 20px 0;background:var(--teal-light);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;border:1.5px solid rgba(29,158,117,.15);}
.banner-icon{font-size:24px;}
.banner-count{font-size:18px;font-weight:700;color:var(--teal);display:block;}
.banner-sub{font-size:11px;color:var(--text-muted);}

/* PROGRESS */
.prog-wrap{margin:14px 20px 0;}
.prog-bar-bg{height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-bar-fill{height:100%;background:var(--teal);border-radius:99px;transition:width .4s ease;}
.prog-label{font-size:12px;color:var(--text-muted);margin-top:6px;text-align:right;}

/* SECTION */
.sec-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);padding:16px 20px 8px;}

/* ITEM CARDS */
.items-list{padding:0 20px;display:flex;flex-direction:column;gap:8px;}
.ing-card{background:var(--white);border-radius:16px;display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:all .2s;border:2px solid transparent;box-shadow:0 2px 8px rgba(44,40,32,.05);}
.ing-card:hover{border-color:var(--teal);}
.ing-card.checked{opacity:.5;background:var(--cream);}
.ing-card.en-stock{background:var(--teal-light);opacity:.75;}
.checkbox{width:24px;height:24px;border-radius:99px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.ing-card.checked .checkbox,.ing-card.en-stock .checkbox{background:var(--teal);border-color:var(--teal);}
.check-icon{font-size:12px;color:white;display:none;}
.ing-card.checked .check-icon,.ing-card.en-stock .check-icon{display:block;}
.ing-info{flex:1;}
.ing-nom{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;}
.ing-card.checked .ing-nom{text-decoration:line-through;color:var(--text-muted);}
.ing-qty-label{font-size:12px;color:var(--text-muted);}
.manque-badge{background:var(--coral);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px;}
.stock-badge{background:var(--teal);color:white;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:6px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:56px;margin-bottom:12px;}
.empty-title{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text-muted);line-height:1.55;margin-bottom:20px;}
.go-btn{display:inline-block;padding:13px 28px;background:var(--teal);color:white;border-radius:99px;font-weight:600;font-size:14px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}

/* RESET */
.reset-row{padding:16px 20px;text-align:center;}
.reset-btn{background:none;border:1.5px solid var(--border);padding:9px 20px;border-radius:99px;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;}

/* NAV */
.fnav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-radius:99px;padding:10px 8px;display:flex;gap:2px;box-shadow:0 8px 40px rgba(44,40,32,.20);z-index:100;border:1px solid rgba(229,221,213,.5);}
.fnb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 14px;border:none;border-radius:99px;background:transparent;cursor:pointer;transition:all .2s;min-width:52px;}
.fi{font-size:20px;line-height:1;}
.fl{font-size:9px;font-weight:600;color:var(--text-muted);}
.fnb.active{background:var(--teal);}
.fnb.active .fl{color:rgba(255,255,255,.9);}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--white);padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--teal);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-actions">
    <button class="icon-btn" onclick="copierListe()" title="Copier">📋</button>
  </div>
  <div class="topbar-title">🛒 Courses</div>
  <div class="topbar-sub" id="topbarSub">Semaine en cours</div>
</div>

<div class="tabs">
  <button class="tab active" id="tabTout" onclick="setFilter('tout')">Tout</button>
  <button class="tab" id="tabAcheter" onclick="setFilter('acheter')">À acheter</button>
  <button class="tab" id="tabStock" onclick="setFilter('stock')">En stock</button>
</div>

<div class="banner" id="invBanner">
  <div class="banner-icon">📦</div>
  <div><span class="banner-count" id="invBannerCount">—</span><span class="banner-sub" id="invBannerSub">Chargement…</span></div>
</div>

<div class="prog-wrap" id="progWrap"></div>
<div id="mainContent"></div>

<nav class="fnav">
  <button class="fnb" onclick="goTo('semainier.html')"><div class="fi">📅</div><div class="fl">Semaine</div></button>
  <button class="fnb" onclick="goTo('livre.html')"><div class="fi">📖</div><div class="fl">Recettes</div></button>
  <button class="fnb active" onclick="goTo('courses.html')"><div class="fi">🛒</div><div class="fl">Courses</div></button>
  <button class="fnb" onclick="goTo('inventaire.html')"><div class="fi">📦</div><div class="fl">Stock</div></button>
  <button class="fnb" onclick="goTo('profil.html')"><div class="fi">👤</div><div class="fl">Profil</div></button>
</nav>

<script>
const SUPABASE_URL='https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';
let allItems=[],checkedState={},inventaire={},currentFilter='tout';
function goTo(u){window.location.href=u;}
function getUserId(){return localStorage.getItem('clara_user_id')||'anon';}
function getWeekId(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));return l.toISOString().slice(0,10);}
function getWeekLabel(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));return l.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});}

async function chargerInventaire(){
  const c=localStorage.getItem('clara_inventaire_'+getUserId());if(c)try{inventaire=JSON.parse(c);}catch(e){}
  try{const uid=getUserId();const r=await fetch(`${SUPABASE_URL}/rest/v1/inventaire?user_id=eq.${encodeURIComponent(uid)}&select=*`,{headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});if(r.ok){const rows=await r.json();if(rows.length){inventaire={};rows.forEach(r=>{inventaire[r.ingredient.toLowerCase()]={nom:r.ingredient,quantite:r.quantite,unite:r.unite||''};});localStorage.setItem('clara_inventaire_'+getUserId(),JSON.stringify(inventaire));}}}catch(e){}
}

function buildListe(){
  const sem=getWeekId(),raw=localStorage.getItem('clara_planning_'+sem);
  if(!raw)return[];
  let planning;try{planning=JSON.parse(raw);}catch(e){return[];}
  const profRaw=localStorage.getItem('clara_profile'),profil=profRaw?JSON.parse(profRaw):{nb_personnes:2};
  const nbP=profil.nb_personnes||2,map={};
  for(const jour of Object.values(planning))for(const recette of Object.values(jour)){
    if(!recette?.ingredients)continue;
    const ratio=nbP/(recette.personnes||4);
    for(const ing of recette.ingredients){const key=ing.nom.toLowerCase().trim();if(!map[key])map[key]={nom:ing.nom,quantite:0,unite:ing.unite||''};map[key].quantite+=ing.quantite*ratio;}
  }
  return Object.values(map).sort((a,b)=>a.nom.localeCompare(b.nom,'fr')).map(item=>{
    const key=item.nom.toLowerCase(),stock=inventaire[key],needed=item.quantite,stockQty=stock?.quantite||0;
    let enStock=false,partiel=false,manque=needed;
    if(stock&&stockQty>0){if(stockQty>=needed-0.001){enStock=true;manque=0;}else{partiel=true;manque=needed-stockQty;}}
    return{...item,needed_qty:needed,stock_qty:stockQty,stock_unite:stock?.unite||'',enStock,partiel,manque};
  });
}

function setFilter(f){
  currentFilter=f;
  ['tout','acheter','stock'].forEach(id=>{document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active',id===f);});
  renderListe();
}

function renderInventaireBanner(){
  const total=Object.keys(inventaire).length,enStock=allItems.filter(i=>i.enStock).length;
  document.getElementById('invBannerCount').textContent=enStock+' en stock';
  document.getElementById('invBannerSub').textContent=total?`${total} articles · ${enStock} économisés cette semaine`:'Ajoutez votre stock pour déduire les courses';
}

function renderListe(){
  const filtered=allItems.filter(item=>{if(currentFilter==='acheter')return!item.enStock;if(currentFilter==='stock')return item.enStock;return true;});
  const aAcheter=filtered.filter(i=>!i.enStock),enStockList=filtered.filter(i=>i.enStock);
  const checked=aAcheter.filter(i=>checkedState[i.nom]).length,totalA=aAcheter.length;

  // Progress
  const pw=document.getElementById('progWrap');
  if(totalA>0){const pct=Math.round((checked/totalA)*100);pw.innerHTML=`<div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%"></div></div><div class="prog-label">${checked}/${totalA} cochés</div>`;}
  else pw.innerHTML='';

  let html='';
  if(!aAcheter.length&&!enStockList.length){
    html=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">Tout est prêt !</div><div class="empty-sub">Clara a tout trouvé dans votre inventaire.</div></div>`;
    document.getElementById('mainContent').innerHTML=html;return;
  }
  if(aAcheter.length){
    if(currentFilter!=='stock')html+=`<div class="sec-label">🛒 À acheter (${aAcheter.length})</div>`;
    html+=`<div class="items-list">`;
    html+=aAcheter.map(item=>{
      const isC=!!checkedState[item.nom],q=fmtQ(item.manque||item.needed_qty,item.unite);
      const partielBadge=item.partiel?`<span class="manque-badge">manque ${fmtQ(item.manque,item.unite)}</span>`:'';
      return`<div class="ing-card${isC?' checked':''}" onclick="toggleItem('${hesc(item.nom)}')">
        <div class="checkbox"><span class="check-icon">✓</span></div>
        <div class="ing-info"><div class="ing-nom">${hesc(item.nom)}${partielBadge}</div><div class="ing-qty-label">${q}${item.partiel?' (stock: '+fmtQ(item.stock_qty,item.stock_unite)+')':''}</div></div>
      </div>`;
    }).join('');
    html+=`</div>`;
  }
  if(enStockList.length&&currentFilter!=='acheter'){
    html+=`<div class="sec-label">✅ Déjà en stock</div><div class="items-list">`;
    html+=enStockList.map(item=>`<div class="ing-card en-stock">
      <div class="checkbox"><span class="check-icon">✓</span></div>
      <div class="ing-info"><div class="ing-nom">${hesc(item.nom)}<span class="stock-badge">📦 stock</span></div><div class="ing-qty-label">${fmtQ(item.stock_qty,item.stock_unite)} disponibles</div></div>
    </div>`).join('');
    html+=`</div>`;
  }
  html+=`<div class="reset-row"><button class="reset-btn" onclick="resetChecked()">↺ Réinitialiser</button></div>`;
  document.getElementById('mainContent').innerHTML=html;
}

function toggleItem(nom){checkedState[nom]=!checkedState[nom];localStorage.setItem('clara_courses_checked_'+getWeekId(),JSON.stringify(checkedState));renderListe();}
function resetChecked(){checkedState={};localStorage.setItem('clara_courses_checked_'+getWeekId(),'{}');renderListe();}

function copierListe(){
  let txt='LISTE DE COURSES — Clara\n══════════════════════\n';
  allItems.filter(i=>!i.enStock).forEach(item=>{const q=fmtQ(item.manque||item.needed_qty,item.unite);const c=checkedState[item.nom]?'☑':'☐';txt+=`${c}  ${item.nom}${q?' — '+q:''}\n`;});
  if(allItems.some(i=>i.enStock)){txt+='\n── En stock ──\n';allItems.filter(i=>i.enStock).forEach(i=>{txt+=`☑  ${i.nom}\n`;});}
  navigator.clipboard.writeText(txt).then(()=>showToast('Liste copiée 📋','success')).catch(()=>showToast('Erreur copie'));
}

function fmtQ(qty,unite){if(!qty&&qty!==0)return'';const q=qty%1===0?qty.toFixed(0):parseFloat(qty.toFixed(1)).toString();return q+(unite?' '+unite:'');}
function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let tt;function showToast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');clearTimeout(tt);tt=setTimeout(()=>e.className='toast',2800);}

async function sauvegarderSupabase(){
  try{const uid=getUserId(),sem=getWeekId();const rows=allItems.map(it=>({user_id:uid,semaine:sem,ingredient:it.nom,quantite:parseFloat(fmtQ(it.needed_qty,''))||0,unite:it.unite,checked:!!checkedState[it.nom]}));await fetch(`${SUPABASE_URL}/rest/v1/courses?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}`,{method:'DELETE',headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});await fetch(`${SUPABASE_URL}/rest/v1/courses`,{method:'POST',headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(rows)});}catch(e){}
}

function renderEmpty(){
  document.getElementById('topbarSub').textContent='Aucune semaine sauvegardée';
  document.getElementById('invBanner').style.display='none';
  document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><div class="empty-title">Pas encore de liste</div><div class="empty-sub">Générez et sauvegardez votre semainier pour voir votre liste apparaître ici.</div><button class="go-btn" onclick="goTo('semainier.html')">→ Semainier</button></div>`;
}

async function init(){
  await chargerInventaire();
  const sem=getWeekId(),raw=localStorage.getItem('clara_planning_'+sem);
  if(!raw){renderEmpty();return;}
  document.getElementById('topbarSub').textContent='Semaine du '+getWeekLabel();
  const ch=localStorage.getItem('clara_courses_checked_'+sem);if(ch)try{checkedState=JSON.parse(ch);}catch(e){}
  allItems=buildListe();
  if(!allItems.length){renderEmpty();return;}
  renderInventaireBanner();renderListe();
  sauvegarderSupabase();
}
init();
</script>
</body>
</html>
