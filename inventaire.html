<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Clara — Mon Inventaire</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;--coral:#D85A30;--coral-light:#FDF0EB;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;--white:#fff;--nav-h:68px;--radius:14px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:calc(var(--nav-h)+24px);}
    .page{max-width:480px;margin:0 auto;padding:0 16px;}

    /* Header */
    .header{padding:20px 0 14px;position:sticky;top:0;background:var(--cream);z-index:10;}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
    .header-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--text);}
    .header-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .sync-btn{padding:8px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .sync-btn:hover{border-color:var(--teal);color:var(--teal);}

    /* Barre de recherche + ajout */
    .add-bar{display:flex;gap:8px;margin-bottom:16px;}
    .search-wrap{flex:1;position:relative;}
    .search-input{width:100%;padding:12px 16px 12px 40px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--white);outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:var(--teal);}
    .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
    .add-btn{padding:12px 18px;border-radius:10px;background:var(--teal);color:white;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
    .add-btn:hover{background:var(--teal-dark);}
    .add-btn:active{transform:scale(.97);}

    /* Suggestions autocomplete */
    .suggestions{background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-top:-8px;margin-bottom:12px;display:none;}
    .suggestions.visible{display:block;}
    .suggestion-item{padding:11px 16px;font-size:14px;color:var(--text);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);}
    .suggestion-item:last-child{border-bottom:none;}
    .suggestion-item:hover{background:var(--teal-light);}

    /* Modal ajout/édition */
    .modal-overlay{position:fixed;inset:0;background:rgba(44,40,32,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
    .modal-overlay.visible{opacity:1;pointer-events:all;}
    .modal-card{background:var(--white);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .35s cubic-bezier(.25,.8,.25,1);}
    .modal-overlay.visible .modal-card{transform:translateY(0);}
    .modal-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:20px;}
    .modal-field{margin-bottom:14px;}
    .modal-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;display:block;}
    .modal-input{width:100%;padding:13px 16px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--cream);outline:none;transition:border-color .2s;}
    .modal-input:focus{border-color:var(--teal);}
    .modal-row{display:flex;gap:10px;}
    .modal-row .modal-field{flex:1;}
    .unite-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
    .unite-pill{padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--cream);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
    .unite-pill.active{background:var(--teal);border-color:var(--teal);color:white;}
    .modal-actions{display:flex;gap:10px;margin-top:20px;}
    .modal-btn{flex:1;padding:15px;border-radius:var(--radius);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
    .modal-btn.primary{background:var(--teal);color:white;}
    .modal-btn.primary:hover{background:var(--teal-dark);}
    .modal-btn.secondary{background:var(--cream);color:var(--text);}
    .modal-btn.danger{background:var(--coral-light);color:var(--coral);}
    .modal-btn:active{transform:scale(.97);}

    /* Stats bar */
    .stats-bar{display:flex;gap:12px;margin-bottom:16px;}
    .stat-chip{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;text-align:center;}
    .stat-num{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--teal);}
    .stat-label{font-size:11px;color:var(--text-muted);margin-top:2px;}

    /* Liste inventaire */
    .inv-list{display:flex;flex-direction:column;gap:8px;}
    .inv-item{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s;animation:fadeUp .25s ease both;}
    .inv-item:hover{border-color:var(--teal);}
    .inv-item.low{border-color:rgba(216,90,48,.3);background:var(--coral-light);}
    .inv-emoji{font-size:26px;flex-shrink:0;}
    .inv-info{flex:1;min-width:0;}
    .inv-nom{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
    .inv-qty{font-size:13px;color:var(--text-muted);}
    .inv-qty strong{color:var(--teal);font-weight:700;}
    .inv-item.low .inv-qty strong{color:var(--coral);}
    .inv-edit-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--text-muted);transition:all .2s;flex-shrink:0;}
    .inv-edit-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light);}

    /* Sections */
    .section-header{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin:16px 0 8px 4px;}

    /* Empty */
    .empty{text-align:center;padding:48px 20px;}
    .empty-emoji{font-size:48px;margin-bottom:12px;}
    .empty-title{font-family:'Lora',serif;font-size:18px;margin-bottom:8px;}
    .empty-sub{font-size:13px;color:var(--text-muted);line-height:1.5;}

    /* Loading */
    .loading-overlay{position:fixed;inset:0;z-index:300;background:rgba(247,243,237,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .3s;}
    .loading-overlay.visible{opacity:1;pointer-events:all;}
    .loader{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
    .loader-text{font-family:'Lora',serif;font-size:13px;color:var(--text-muted);font-style:italic;}

    /* Toast */
    .toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--white);padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:400;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{background:var(--teal);}
    .toast.error{background:var(--coral);}

    /* Nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1.5px solid var(--border);display:flex;align-items:center;padding:0 4px;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;cursor:pointer;border-radius:10px;transition:all .2s;border:none;background:none;}
    .nav-icon{font-size:19px;line-height:1;}
    .nav-label{font-size:9px;font-weight:600;color:var(--text-muted);}
    .nav-item.active .nav-label{color:var(--teal);}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);opacity:0;}
    .nav-item.active .nav-dot{opacity:1;}

    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loader-text">Chargement de l'inventaire…</div>
</div>
<div class="toast" id="toast"></div>

<!-- Modal ajout / édition -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <div class="modal-title" id="modalTitle">Ajouter un ingrédient</div>
    <div class="modal-field">
      <label class="modal-label">Ingrédient</label>
      <input class="modal-input" id="modalNom" type="text" placeholder="ex. Farine de blé" autocapitalize="words"/>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label class="modal-label">Quantité</label>
        <input class="modal-input" id="modalQty" type="number" min="0" step="0.1" placeholder="0"/>
      </div>
      <div class="modal-field">
        <label class="modal-label">Unité</label>
        <input class="modal-input" id="modalUnite" type="text" placeholder="g, ml, pièce…"/>
      </div>
    </div>
    <div class="unite-pills" id="unitePills">
      <div class="unite-pill" onclick="setUnite('g')">g</div>
      <div class="unite-pill" onclick="setUnite('kg')">kg</div>
      <div class="unite-pill" onclick="setUnite('ml')">ml</div>
      <div class="unite-pill" onclick="setUnite('L')">L</div>
      <div class="unite-pill" onclick="setUnite('c.à.s')">c.à.s</div>
      <div class="unite-pill" onclick="setUnite('c.à.c')">c.à.c</div>
      <div class="unite-pill" onclick="setUnite('pièce')">pièce</div>
    </div>
    <div class="modal-actions" id="modalActions">
      <button class="modal-btn secondary" onclick="closeModal()">Annuler</button>
      <button class="modal-btn primary" onclick="sauvegarderItem()">✓ Ajouter</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">📦 Inventaire</div>
        <div class="header-sub" id="headerSub">Mon stock de cuisine</div>
      </div>
      <button class="sync-btn" onclick="syncerDepuisCourses()">↻ Sync courses</button>
    </div>
    <!-- Barre ajout -->
    <div class="add-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Rechercher ou ajouter…" oninput="onSearch()" autocomplete="off"/>
      </div>
      <button class="add-btn" onclick="ouvrirModal()">＋ Ajouter</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip"><div class="stat-num" id="statTotal">0</div><div class="stat-label">articles</div></div>
    <div class="stat-chip"><div class="stat-num" id="statFaible" style="color:var(--coral)">0</div><div class="stat-label">à renouveler</div></div>
    <div class="stat-chip"><div class="stat-num" id="statEconomie">0</div><div class="stat-label">économisés courses</div></div>
  </div>

  <div id="mainContent"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('index.html')"><div class="nav-icon">🏠</div><div class="nav-label">Accueil</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('semainier.html')"><div class="nav-icon">📅</div><div class="nav-label">Semainier</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('courses.html')"><div class="nav-icon">🛒</div><div class="nav-label">Courses</div><div class="nav-dot"></div></button>
  <button class="nav-item active"><div class="nav-icon">📦</div><div class="nav-label">Inventaire</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('profil.html')"><div class="nav-icon">👤</div><div class="nav-label">Profil</div><div class="nav-dot"></div></button>
</nav>

<script>
const SUPABASE_URL='https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';

// ── STATE ──
let inventaire = {}; // { nom_lower: {nom, quantite, unite, id} }
let editingKey = null;
let searchQuery = '';

function goTo(u){window.location.href=u;}
function getUserId(){return localStorage.getItem('clara_user_id')||'anon';}

// ── SUPABASE ──
async function supaFetch(path, opts={}){
  const r = await fetch(SUPABASE_URL+path, {
    ...opts,
    headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})}
  });
  if(!r.ok) throw new Error(await r.text());
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

// ── CHARGEMENT ──
async function chargerInventaire(){
  // D'abord localStorage
  const cached = localStorage.getItem('clara_inventaire_'+getUserId());
  if(cached){ try{ inventaire = JSON.parse(cached); } catch(e){} }

  try{
    const uid = getUserId();
    const data = await supaFetch(`/rest/v1/inventaire?user_id=eq.${encodeURIComponent(uid)}&select=*&order=ingredient.asc`);
    if(data && data.length){
      inventaire = {};
      data.forEach(row => {
        inventaire[row.ingredient.toLowerCase()] = {nom:row.ingredient, quantite:row.quantite, unite:row.unite||'', id:row.id};
      });
      localStorage.setItem('clara_inventaire_'+getUserId(), JSON.stringify(inventaire));
    }
  } catch(e){ console.warn('Supabase inventaire:', e); }
}

async function sauvegarderSupabase(nom, quantite, unite){
  const uid = getUserId();
  try{
    const payload = {user_id:uid, ingredient:nom, quantite:parseFloat(quantite)||0, unite:unite||'', updated_at:new Date().toISOString()};
    await supaFetch('/rest/v1/inventaire', {
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(payload)
    });
  } catch(e){ console.warn('Save inventaire:', e); }
}

async function supprimerSupabase(nom){
  const uid = getUserId();
  try{
    await supaFetch(`/rest/v1/inventaire?user_id=eq.${encodeURIComponent(uid)}&ingredient=eq.${encodeURIComponent(nom)}`, {method:'DELETE'});
  } catch(e){ console.warn('Delete inventaire:', e); }
}

// ── SYNC DEPUIS COURSES ──
// Après une semaine de courses, marquer les achats comme reçus en stock
async function syncerDepuisCourses(){
  const sem = getWeekId();
  const raw = localStorage.getItem('clara_planning_'+sem);
  if(!raw){ showToast('Aucun semainier sauvegardé', 'error'); return; }

  let planning; try{ planning=JSON.parse(raw); } catch(e){ return; }
  const profRaw = localStorage.getItem('clara_profile');
  const profil = profRaw ? JSON.parse(profRaw) : {nb_personnes:2};
  const nbP = profil.nb_personnes||2;

  const ajouts = {};
  for(const jour of Object.values(planning)){
    for(const recette of Object.values(jour)){
      if(!recette?.ingredients) continue;
      const ratio = nbP/(recette.personnes||4);
      for(const ing of recette.ingredients){
        const key = ing.nom.toLowerCase().trim();
        if(!ajouts[key]) ajouts[key] = {nom:ing.nom, quantite:0, unite:ing.unite||''};
        ajouts[key].quantite += ing.quantite * ratio;
      }
    }
  }

  showLoading(true);
  // Ajouter les ingrédients manquants dans l'inventaire avec quantité 0 (à remplir)
  let nouveaux = 0;
  for(const [key, item] of Object.entries(ajouts)){
    if(!inventaire[key]){
      inventaire[key] = {nom:item.nom, quantite:0, unite:item.unite};
      await sauvegarderSupabase(item.nom, 0, item.unite);
      nouveaux++;
    }
  }
  localStorage.setItem('clara_inventaire_'+getUserId(), JSON.stringify(inventaire));
  showLoading(false);
  renderInventaire();
  showToast(`${nouveaux} nouveaux articles ajoutés à l'inventaire`, 'success');
}

// ── MODAL ──
function ouvrirModal(key=null){
  editingKey = key;
  const item = key ? inventaire[key] : null;
  document.getElementById('modalTitle').textContent = key ? 'Modifier' : 'Ajouter un ingrédient';
  document.getElementById('modalNom').value = item ? item.nom : (document.getElementById('searchInput').value||'');
  document.getElementById('modalNom').disabled = !!key;
  document.getElementById('modalQty').value = item ? item.quantite : '';
  document.getElementById('modalUnite').value = item ? item.unite : '';

  // Actions
  const actions = document.getElementById('modalActions');
  if(key){
    actions.innerHTML = `
      <button class="modal-btn danger" onclick="supprimerItem('${hesc(key)}')">🗑 Supprimer</button>
      <button class="modal-btn secondary" onclick="closeModal()">Annuler</button>
      <button class="modal-btn primary" onclick="sauvegarderItem()">✓ Modifier</button>`;
  } else {
    actions.innerHTML = `
      <button class="modal-btn secondary" onclick="closeModal()">Annuler</button>
      <button class="modal-btn primary" onclick="sauvegarderItem()">✓ Ajouter</button>`;
  }
  refreshUnitePills(item?.unite||'');
  document.getElementById('modalOverlay').classList.add('visible');
  setTimeout(()=>document.getElementById(key?'modalQty':'modalNom').focus(), 200);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('visible');
  editingKey = null;
}

function setUnite(u){
  document.getElementById('modalUnite').value = u;
  refreshUnitePills(u);
}
function refreshUnitePills(active){
  document.querySelectorAll('.unite-pill').forEach(p=>{
    p.classList.toggle('active', p.textContent===active);
  });
}

async function sauvegarderItem(){
  const nom = document.getElementById('modalNom').value.trim();
  const qty = parseFloat(document.getElementById('modalQty').value)||0;
  const unite = document.getElementById('modalUnite').value.trim();
  if(!nom){ showToast('Saisissez un nom d\'ingrédient'); return; }

  const key = nom.toLowerCase();
  inventaire[key] = {nom, quantite:qty, unite};
  localStorage.setItem('clara_inventaire_'+getUserId(), JSON.stringify(inventaire));
  closeModal();
  document.getElementById('searchInput').value = '';
  renderInventaire();
  showLoading(true);
  await sauvegarderSupabase(nom, qty, unite);
  showLoading(false);
  showToast(editingKey ? 'Stock mis à jour ✓' : `${nom} ajouté ✓`, 'success');
}

async function supprimerItem(key){
  const item = inventaire[key];
  if(!item) return;
  delete inventaire[key];
  localStorage.setItem('clara_inventaire_'+getUserId(), JSON.stringify(inventaire));
  closeModal();
  renderInventaire();
  await supprimerSupabase(item.nom);
  showToast(`${item.nom} retiré`, 'success');
}

// ── RECHERCHE / AUTOCOMPLETE ──
function onSearch(){
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  renderInventaire();
  renderSuggestions();
}

function renderSuggestions(){
  const q = document.getElementById('searchInput').value.trim();
  if(!q || q.length < 2){ hideSuggestions(); return; }
  const matches = Object.values(inventaire).filter(i=>i.nom.toLowerCase().includes(q.toLowerCase())).slice(0,5);
  if(!matches.length){ hideSuggestions(); return; }
  document.getElementById('suggestions').innerHTML = matches.map(i=>
    `<div class="suggestion-item" onclick="ouvrirModal('${hesc(i.nom.toLowerCase())}')">${hesc(i.nom)} — <strong>${formatQty(i.quantite, i.unite)}</strong></div>`
  ).join('');
  document.getElementById('suggestions').classList.add('visible');
}
function hideSuggestions(){ document.getElementById('suggestions').classList.remove('visible'); }

// ── RENDU ──
function renderInventaire(){
  const items = Object.values(inventaire).filter(i=>
    !searchQuery || i.nom.toLowerCase().includes(searchQuery)
  ).sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));

  const total = Object.keys(inventaire).length;
  const faible = Object.values(inventaire).filter(i=>i.quantite===0).length;

  // Calculer économies (articles en stock qui correspondent aux courses)
  const sem = getWeekId();
  const raw = localStorage.getItem('clara_planning_'+sem);
  let economises = 0;
  if(raw){ try{
    const planning = JSON.parse(raw);
    const profil = JSON.parse(localStorage.getItem('clara_profile')||'{}');
    const nbP = profil.nb_personnes||2;
    for(const jour of Object.values(planning)){
      for(const recette of Object.values(jour)){
        if(!recette?.ingredients)continue;
        const ratio = nbP/(recette.personnes||4);
        for(const ing of recette.ingredients){
          const key = ing.nom.toLowerCase().trim();
          const stock = inventaire[key];
          if(stock && stock.quantite > 0 && stock.quantite >= ing.quantite*ratio) economises++;
        }
      }
    }
  }catch(e){} }

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statFaible').textContent = faible;
  document.getElementById('statEconomie').textContent = economises;
  document.getElementById('headerSub').textContent = `${total} article${total>1?'s':''} en stock`;

  if(!items.length){
    document.getElementById('mainContent').innerHTML = searchQuery
      ? `<div class="empty"><div class="empty-emoji">🔍</div><div class="empty-title">Aucun résultat</div><div class="empty-sub">Appuyez sur ＋ Ajouter pour créer cet article.</div></div>`
      : `<div class="empty"><div class="empty-emoji">📦</div><div class="empty-title">Votre inventaire est vide</div><div class="empty-sub">Ajoutez les ingrédients que vous avez déjà chez vous. Clara les déduira automatiquement de vos listes de courses.</div></div>`;
    return;
  }

  // Grouper : En stock / À renouveler
  const enStock = items.filter(i=>i.quantite>0);
  const aRenouveler = items.filter(i=>i.quantite===0);

  let html = '';
  if(aRenouveler.length){
    html += `<div class="section-header">⚠️ À renouveler</div>`;
    html += aRenouveler.map(item => itemHtml(item, true)).join('');
  }
  if(enStock.length){
    html += `<div class="section-header">✅ En stock</div>`;
    html += enStock.map(item => itemHtml(item, false)).join('');
  }

  document.getElementById('mainContent').innerHTML = '<div class="inv-list">'+html+'</div>';
}

function itemHtml(item, isLow){
  const key = hesc(item.nom.toLowerCase());
  const qtyStr = item.quantite > 0 ? `<strong>${formatQty(item.quantite, item.unite)}</strong>` : '<strong style="color:var(--coral)">À renouveler</strong>';
  return `<div class="inv-item${isLow?' low':''}" onclick="ouvrirModal('${key}')">
    <div class="inv-emoji">${getEmoji(item.nom)}</div>
    <div class="inv-info">
      <div class="inv-nom">${hesc(item.nom)}</div>
      <div class="inv-qty">${qtyStr}</div>
    </div>
    <button class="inv-edit-btn" onclick="event.stopPropagation();ouvrirModal('${key}')">✎</button>
  </div>`;
}

function formatQty(qty, unite){
  if(!qty) return '';
  const q = qty%1===0 ? qty.toFixed(0) : parseFloat(qty.toFixed(1)).toString();
  return q + (unite ? ' '+unite : '');
}

// Emoji basique selon le nom
function getEmoji(nom){
  const n = nom.toLowerCase();
  if(n.includes('farine')||n.includes('semoule'))return'🌾';
  if(n.includes('lait'))return'🥛';
  if(n.includes('œuf')||n.includes('oeuf'))return'🥚';
  if(n.includes('beurre'))return'🧈';
  if(n.includes('huile'))return'🫙';
  if(n.includes('sel'))return'🧂';
  if(n.includes('sucre'))return'🍬';
  if(n.includes('tomate'))return'🍅';
  if(n.includes('oignon'))return'🧅';
  if(n.includes('ail'))return'🧄';
  if(n.includes('pomme de terre'))return'🥔';
  if(n.includes('carotte'))return'🥕';
  if(n.includes('poulet'))return'🍗';
  if(n.includes('bœuf')||n.includes('boeuf')||n.includes('viande'))return'🥩';
  if(n.includes('poisson')||n.includes('saumon'))return'🐟';
  if(n.includes('citron'))return'🍋';
  if(n.includes('pomme'))return'🍎';
  if(n.includes('riz'))return'🍚';
  if(n.includes('pâte')||n.includes('pasta'))return'🍝';
  if(n.includes('fromage'))return'🧀';
  if(n.includes('yaourt'))return'🥛';
  if(n.includes('chocolat'))return'🍫';
  if(n.includes('café'))return'☕';
  return'📦';
}

function getWeekId(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));return l.toISOString().slice(0,10);}
function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showLoading(v){document.getElementById('loadingOverlay').classList.toggle('visible',v);}
let tt;function showToast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');clearTimeout(tt);tt=setTimeout(()=>e.className='toast',2800);}

// Fermer modal en cliquant dehors
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// Fermer suggestions en cliquant ailleurs
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap')&&!e.target.closest('.suggestions'))hideSuggestions();});

// Init
async function init(){
  showLoading(true);
  await chargerInventaire();
  showLoading(false);
  renderInventaire();
}
init();
</script>
