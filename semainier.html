<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Clara [Ensemble] — Semainier</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;--coral:#D85A30;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;--white:#fff;--nav-h:68px;--radius:14px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;}
    body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:calc(var(--nav-h)+16px);}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 16px;}
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px;position:sticky;top:0;z-index:10;background:var(--cream);}
    .brand{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--teal);}
    .week-label{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .header-actions{display:flex;gap:8px;}
    .icon-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;}
    .icon-btn:hover{border-color:var(--teal);background:var(--teal-light);}
    .saison-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .saison-badge{padding:6px 12px;border-radius:99px;background:var(--teal-light);border:1.5px solid rgba(29,158,117,.2);font-size:12px;font-weight:600;color:var(--teal);}
    .profile-chip{padding:6px 12px;border-radius:99px;background:var(--white);border:1.5px solid var(--border);font-size:12px;color:var(--text-muted);}
    .view-toggle{display:flex;background:var(--white);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
    .toggle-btn{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;background:transparent;border:none;font-family:'DM Sans',sans-serif;}
    .toggle-btn.active{background:var(--teal);color:var(--white);}
    .days-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
    .days-nav::-webkit-scrollbar{display:none;}
    .day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:10px;background:var(--white);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;min-width:52px;}
    .day-tab.active{background:var(--teal);border-color:var(--teal);}
    .day-tab.has-data:not(.active){border-color:rgba(29,158,117,.3);}
    .day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
    .day-tab.active .day-name{color:rgba(255,255,255,.8);}
    .day-num{font-size:16px;font-weight:700;color:var(--text);margin-top:2px;}
    .day-tab.active .day-num{color:var(--white);}
    .moment-section{margin-bottom:14px;}
    .moment-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;padding-left:4px;}
    .recette-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 14px 14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;animation:fadeUp .3s ease both;}
    .recette-card:hover{border-color:var(--teal);}
    .recette-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal);border-radius:99px 0 0 99px;opacity:0;transition:opacity .2s;}
    .recette-card:hover::before{opacity:1;}
    .recette-emoji{font-size:30px;flex-shrink:0;line-height:1;}
    .recette-info{flex:1;min-width:0;}
    .recette-titre{font-weight:600;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
    .recette-meta{display:flex;gap:8px;align-items:center;}
    .meta-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--cream);color:var(--text-muted);}
    .meta-badge.budget{color:var(--teal);background:var(--teal-light);}
    .refresh-btn{width:32px;height:32px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:var(--text-muted);transition:all .2s;}
    .refresh-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light);}
    .refresh-btn.spinning{animation:spin .5s linear;}
    .empty-slot{border:1.5px dashed var(--border);border-radius:var(--radius);padding:18px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;color:var(--text-muted);font-size:13px;background:transparent;}
    .empty-slot:hover{border-color:var(--teal);color:var(--teal);}
    .week-view{display:flex;flex-direction:column;gap:18px;margin-bottom:8px;}
    .week-day-header{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
    .week-day-header span{color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;}
    .cta-row{display:flex;gap:10px;margin-bottom:16px;}
    .cta-btn{flex:1;padding:15px 12px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;}
    .cta-btn.primary{background:var(--teal);color:var(--white);}
    .cta-btn.primary:hover{background:var(--teal-dark);}
    .cta-btn.secondary{background:var(--white);color:var(--text);border:1.5px solid var(--border);}
    .cta-btn.secondary:hover{border-color:var(--teal);color:var(--teal);}
    .cta-btn:active{transform:scale(.98);}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1.5px solid var(--border);display:flex;align-items:center;padding:0 8px;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;cursor:pointer;border-radius:10px;transition:all .2s;border:none;background:none;}
    .nav-icon{font-size:20px;line-height:1;}
    .nav-label{font-size:10px;font-weight:600;color:var(--text-muted);}
    .nav-item.active .nav-label{color:var(--teal);}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);opacity:0;}
    .nav-item.active .nav-dot{opacity:1;}
    .loading-overlay{position:fixed;inset:0;z-index:200;background:rgba(247,243,237,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s;}
    .loading-overlay.visible{opacity:1;pointer-events:all;}
    .loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
    .loader-text{font-family:'Lora',serif;font-size:14px;color:var(--text-muted);font-style:italic;}
    .toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--white);padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:300;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{background:var(--teal);}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loader-text" id="loaderText">Clara prépare votre semaine…</div>
</div>
<div class="toast" id="toast"></div>
<div class="page">
  <div class="header">
    <div>
      <div class="brand">Clara <span style="font-family:'DM Sans';font-weight:400;font-size:13px;color:var(--text-muted)">[Ensemble]</span></div>
      <div class="week-label" id="weekLabel">…</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="Regénérer" onclick="regenererSemaine()">🎲</button>
      <button class="icon-btn" title="Profil" onclick="goTo('profil.html')">👤</button>
    </div>
  </div>
  <div class="saison-bar">
    <div class="saison-badge" id="saisonBadge">🌸 Printemps</div>
    <div class="profile-chip" id="profileChip">👤 …</div>
  </div>
  <div class="view-toggle">
    <button class="toggle-btn active" id="toggleJour" onclick="setView('jour')">Par jour</button>
    <button class="toggle-btn" id="toggleSemaine" onclick="setView('semaine')">Semaine</button>
  </div>
  <div class="days-nav" id="daysNav"></div>
  <div id="mainContent"></div>
  <div class="cta-row">
    <button class="cta-btn secondary" onclick="sauvegarderSemaine()">💾 Sauvegarder</button>
    <button class="cta-btn primary" onclick="goTo('courses.html')">🛒 Courses</button>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('index.html')"><div class="nav-icon">🏠</div><div class="nav-label">Accueil</div><div class="nav-dot"></div></button>
  <button class="nav-item active"><div class="nav-icon">📅</div><div class="nav-label">Semainier</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('courses.html')"><div class="nav-icon">🛒</div><div class="nav-label">Courses</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('profil.html')"><div class="nav-icon">👤</div><div class="nav-label">Profil</div><div class="nav-dot"></div></button>
</nav>
<script>
const SUPABASE_URL='https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';
const JOURS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MOMENTS=['Petit-Déjeuner','Déjeuner','Dîner'];
const MI={'Petit-Déjeuner':'☀️','Déjeuner':'🌤️','Dîner':'🌙'};
const SAISON_ICONS={Printemps:'🌸',Été:'☀️',Automne:'🍂',Hiver:'❄️'};

// ── INDEX GLOBAL DES RECETTES (corrige le bug onclick) ──
const recetteIndex = new Map(); // id → recette object

let profil=null, recettes=[], planning={}, currentJour=0, currentView='jour', saison='';

function goTo(u){window.location.href=u;}
function getUserId(){return localStorage.getItem('clara_user_id')||'anon';}
function getWeekId(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));return l.toISOString().slice(0,10);}
function getSaison(){const m=new Date().getMonth()+1;if(m>=3&&m<=5)return'Printemps';if(m>=6&&m<=8)return'Été';if(m>=9&&m<=11)return'Automne';return'Hiver';}
function getWeekLabel(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));const di=new Date(l);di.setDate(l.getDate()+6);const fmt=x=>x.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});return fmt(l)+' – '+fmt(di);}

// ── CHARGEMENT PROFIL ──
function loadProfil(){try{const r=localStorage.getItem('clara_profile');return r?JSON.parse(r):null;}catch(e){return null;}}

// ── CHARGEMENT RECETTES ──
async function chargerRecettes(){
  try{
    const r=await fetch('recettes.json');
    if(r.ok){
      recettes=await r.json();
      recettes.forEach(r=>recetteIndex.set(String(r.id),r));
      return;
    }
  }catch(e){console.warn('recettes.json non chargé:',e);}
  // Fallback démo
  recettes=DEMO;
  recettes.forEach(r=>recetteIndex.set(String(r.id),r));
}

// ── FILTRAGE ──
function filtrer(moment,opts={}){
  return recettes.filter(r=>{
    if(!(r.tags?.moments||[]).includes(moment))return false;
    const nm={'Facile':1,'Moyenne':2,'Difficile':3,'Intermédiaire':2};
    const pn=nm[profil.niveau]||3, rn=nm[r.tags?.difficulte]||1;
    if(rn>pn)return false;
    if(!opts.saison){const s=r.tags?.saison||[];if(s.length&&!s.includes('Toutes')&&!s.includes(saison))return false;}
    if(!opts.budget&&profil.budget){const bm={'€':1,'€€':2,'€€€':3};if((bm[r.tags?.budget]||2)>(bm[profil.budget]||2))return false;}
    if(!opts.allergenes&&profil.allergies?.length){const al=r.tags?.allergenes||[];for(const a of profil.allergies)if(al.includes(a))return false;}
    return true;
  });
}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function piocher(moment,excl=[]){
  let c=filtrer(moment).filter(r=>!excl.includes(r.id));if(c.length)return pick(c);
  c=filtrer(moment,{saison:true}).filter(r=>!excl.includes(r.id));if(c.length)return pick(c);
  c=filtrer(moment,{saison:true,budget:true}).filter(r=>!excl.includes(r.id));if(c.length)return pick(c);
  c=filtrer(moment,{saison:true,budget:true,allergenes:true}).filter(r=>!excl.includes(r.id));if(c.length)return pick(c);
  const all=recettes.filter(r=>(r.tags?.moments||[]).includes(moment));return all.length?pick(all):null;
}

// ── GÉNÉRATION ──
function genererSemaine(){
  const used=[];planning={};
  for(const j of JOURS){planning[j]={};for(const m of MOMENTS){const r=piocher(m,used);if(r){planning[j][m]=r;used.push(r.id);}}}
}
function regenererSemaine(){
  showLoading(true,'Nouvelle semaine…');
  setTimeout(()=>{genererSemaine();showLoading(false);renderView();showToast('Semaine régénérée ✨','success');},300);
}
function regenererSlot(jour,moment,btn){
  btn.classList.add('spinning');
  const excl=Object.values(planning).flatMap(j=>Object.values(j).map(r=>r?.id)).filter(Boolean);
  const cur=planning[jour]?.[moment];
  const r=piocher(moment,cur?excl.filter(i=>i!==cur.id):excl);
  if(r){if(!planning[jour])planning[jour]={};planning[jour][moment]=r;}
  setTimeout(()=>{btn.classList.remove('spinning');renderView();},300);
}

// ── SUPABASE ──
async function supaFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}
async function chargerPlanningSupabase(){
  try{
    const uid=getUserId(),sem=getWeekId();
    const data=await supaFetch(`/rest/v1/planning?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}&select=*`);
    if(!data||!data.length)return null;
    const plan={};
    for(const row of data){
      if(!plan[row.jour])plan[row.jour]={};
      const rec=recetteIndex.get(String(row.recette_id));
      if(rec)plan[row.jour][row.moment]=rec;
    }
    return Object.keys(plan).length?plan:null;
  }catch(e){return null;}
}
async function sauvegarderSemaine(){
  showLoading(true,'Sauvegarde…');
  const uid=getUserId(),sem=getWeekId();
  const rows=[];
  for(const j of JOURS)for(const m of MOMENTS){const r=planning[j]?.[m];if(r)rows.push({user_id:uid,semaine:sem,jour:j,moment:m,recette_id:String(r.id),recette_titre:r.titre,recette_emoji:r.ux?.emoji||'🍽️'});}
  try{
    await supaFetch(`/rest/v1/planning?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}`,{method:'DELETE'});
    await supaFetch('/rest/v1/planning',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(rows)});
    localStorage.setItem('clara_planning_'+sem,JSON.stringify(planning));
    showLoading(false);showToast('Semaine sauvegardée 💾','success');
  }catch(e){
    localStorage.setItem('clara_planning_'+sem,JSON.stringify(planning));
    showLoading(false);showToast('Sauvegardé en local ✓','success');
  }
}

// ── NAVIGATION RECETTE (CORRIGÉ) ──
// On passe l'ID, on retrouve l'objet depuis recetteIndex — plus de JSON dans le onclick
function ouvrirRecette(id){
  const r=recetteIndex.get(String(id));
  if(!r){showToast('Recette introuvable');return;}
  try{
    sessionStorage.setItem('clara_recette_courante',JSON.stringify(r));
    sessionStorage.setItem('clara_nb_personnes',String(profil.nb_personnes||2));
    window.location.href='recette.html';
  }catch(e){showToast('Erreur navigation');}
}

// ── RENDU ──
function renderDaysNav(){
  const now=new Date(),d=now.getDay(),ti=d===0?6:d-1;
  document.getElementById('daysNav').innerHTML=JOURS.map((j,i)=>{
    const dt=new Date(now);dt.setDate(now.getDate()+(i-ti));
    const hd=planning[j]&&Object.keys(planning[j]).length>0;
    return`<div class="day-tab${i===currentJour?' active':''}${hd&&i!==currentJour?' has-data':''}" onclick="selectJour(${i})">
      <div class="day-name">${j.slice(0,3)}</div>
      <div class="day-num">${dt.getDate()}</div>
    </div>`;
  }).join('');
}
function selectJour(i){currentJour=i;renderDaysNav();if(currentView==='jour')renderVueJour();}
function setView(v){
  currentView=v;
  document.getElementById('toggleJour').className='toggle-btn'+(v==='jour'?' active':'');
  document.getElementById('toggleSemaine').className='toggle-btn'+(v==='semaine'?' active':'');
  document.getElementById('daysNav').style.display=v==='jour'?'flex':'none';
  renderView();
}
function renderView(){currentView==='jour'?renderVueJour():renderVueSemaine();}

function renderVueJour(){
  const j=JOURS[currentJour];
  document.getElementById('mainContent').innerHTML=MOMENTS.map(m=>`
    <div class="moment-section">
      <div class="moment-label">${MI[m]} ${m}</div>
      ${planning[j]?.[m]?cardHtml(planning[j][m],j,m):emptyHtml(j,m)}
    </div>`).join('');
}
function renderVueSemaine(){
  const now=new Date(),d=now.getDay(),ti=d===0?6:d-1;
  document.getElementById('mainContent').innerHTML='<div class="week-view">'+
    JOURS.map(j=>{
      const i=JOURS.indexOf(j),dt=new Date(now);dt.setDate(now.getDate()+(i-ti));
      const ds=dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
      return`<div><div class="week-day-header">${j} <span>${ds}</span></div>${MOMENTS.map(m=>planning[j]?.[m]?cardCompactHtml(planning[j][m],j,m):'').join('')}</div>`;
    }).join('')+'</div>';
}

// Utilise l'ID dans onclick — plus de JSON embarqué
function cardHtml(r,j,m){
  const t=r.metrics?.total_time||'—',b=r.tags?.budget||'€€',e=r.ux?.emoji||'🍽️';
  const id=hesc(String(r.id)),jj=hesc(j),mm=hesc(m);
  return`<div class="recette-card" onclick="ouvrirRecette('${id}')">
    <div class="recette-emoji">${e}</div>
    <div class="recette-info">
      <div class="recette-titre">${hesc(r.titre)}</div>
      <div class="recette-meta"><span class="meta-badge">⏱ ${t} min</span><span class="meta-badge budget">${b}</span></div>
    </div>
    <button class="refresh-btn" onclick="event.stopPropagation();regenererSlot('${jj}','${mm}',this)">↺</button>
  </div>`;
}
function cardCompactHtml(r,j,m){
  const e=r.ux?.emoji||'🍽️',t=r.metrics?.total_time||'—';
  const id=hesc(String(r.id)),jj=hesc(j),mm=hesc(m);
  return`<div class="recette-card" style="margin-bottom:8px;animation:none" onclick="ouvrirRecette('${id}')">
    <div style="font-size:11px;color:var(--text-muted);width:24px;flex-shrink:0;text-align:center">${MI[m]}</div>
    <div class="recette-emoji" style="font-size:22px">${e}</div>
    <div class="recette-info"><div class="recette-titre" style="font-size:13px">${hesc(r.titre)}</div>
    <div class="recette-meta"><span class="meta-badge">⏱ ${t} min</span></div></div>
    <button class="refresh-btn" onclick="event.stopPropagation();regenererSlot('${jj}','${mm}',this)">↺</button>
  </div>`;
}
function emptyHtml(j,m){return`<div class="empty-slot" onclick="regenererSlot('${hesc(j)}','${hesc(m)}',this)"><span>＋</span><span>Ajouter une recette</span></div>`;}
function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── UI HELPERS ──
function showLoading(v,t){const e=document.getElementById('loadingOverlay');e.classList.toggle('visible',v);if(t)document.getElementById('loaderText').textContent=t;}
let tt;function showToast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');clearTimeout(tt);tt=setTimeout(()=>e.className='toast',2800);}

// ── INIT ──
async function init(){
  showLoading(true,'Chargement du profil…');
  profil=loadProfil();
  if(!profil){window.location.href='index.html';return;}
  document.getElementById('weekLabel').textContent=getWeekLabel();
  saison=getSaison();
  document.getElementById('saisonBadge').textContent=(SAISON_ICONS[saison]||'🌿')+' '+saison;
  document.getElementById('profileChip').textContent='👤 '+(profil.prenom||'Vous')+' · '+(profil.nb_personnes||2)+' pers.';
  showLoading(true,'Chargement des recettes…');
  await chargerRecettes();
  showLoading(true,'Génération de la semaine…');
  const planSupa=await chargerPlanningSupabase();
  if(planSupa){planning=planSupa;}
  else{
    const sem=getWeekId();
    const cached=localStorage.getItem('clara_planning_'+sem);
    if(cached){try{planning=JSON.parse(cached);}catch(e){genererSemaine();}}
    else{genererSemaine();}
  }
  showLoading(false);
  const now=new Date(),d=now.getDay();
  currentJour=d===0?6:d-1;
  renderDaysNav();
  renderView();
}
