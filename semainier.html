<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Clara — Semainier</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;--coral:#D85A30;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;--white:#FFFFFF;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:100px;min-height:100vh;}

/* ── TOP HEADER ── */
.topbar{background:var(--white);padding:16px 20px 12px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.brand{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--teal);}
.week-info{font-size:11px;color:var(--text-muted);text-align:right;}
.week-label{font-size:12px;color:var(--text-muted);margin-top:1px;}
.chips-row{display:flex;gap:8px;align-items:center;}
.chip{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:500;}
.chip-teal{background:var(--teal-light);color:var(--teal);border:1.5px solid rgba(29,158,117,.2);}
.chip-gray{background:var(--cream);color:var(--text-muted);border:1.5px solid var(--border);}
.chip strong{color:var(--teal);}
.top-actions{display:flex;gap:8px;}
.btn-icon{width:36px;height:36px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.btn-icon:hover{border-color:var(--teal);background:var(--teal-light);}

/* ── DAYS STRIP ── */
.days-strip{padding:14px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.days-strip::-webkit-scrollbar{display:none;}
.days-inner{display:flex;gap:8px;min-width:max-content;}
.day-card{width:58px;padding:10px 0 8px;border-radius:16px;background:var(--white);border:2px solid var(--border);text-align:center;cursor:pointer;transition:all .2s;position:relative;flex-shrink:0;}
.day-card.active{background:var(--teal);border-color:var(--teal);}
.day-card.complete:not(.active){border-color:var(--teal);background:var(--teal-light);}
.day-card .d-name{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.day-card.active .d-name{color:rgba(255,255,255,.8);}
.day-card.complete:not(.active) .d-name{color:var(--teal-dark);}
.day-card .d-num{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--text);margin-top:2px;}
.day-card.active .d-num{color:var(--white);}
.day-card .d-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);margin:5px auto 0;opacity:0;}
.day-card.complete .d-dot{opacity:1;}
.day-card.active .d-dot{background:rgba(255,255,255,.7);opacity:1;}

/* ── MAIN CONTENT ── */
.content{padding:16px 20px 0;}

/* ── MOMENT SECTION ── */
.moment-block{margin-bottom:20px;}
.moment-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.moment-title{font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
.regen-btn{font-size:11px;color:var(--teal);background:var(--teal-light);border:none;padding:5px 12px;border-radius:99px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;}

/* ── PROPOSAL CARDS ── */
.props-list{display:flex;flex-direction:column;gap:8px;}
.prop-card{background:var(--white);border-radius:16px;border:2px solid var(--border);display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.prop-card:hover{border-color:var(--teal);transform:translateX(2px);}
.prop-card.selected{border-color:var(--teal);background:var(--teal-light);}
.prop-card.unselected{opacity:.45;}
.prop-card.unselected:hover{opacity:.8;}

/* Card thumb */
.prop-thumb-wrap{flex-shrink:0;width:60px;height:60px;border-radius:12px;overflow:hidden;}
.prop-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.prop-emoji-box{width:60px;height:60px;border-radius:12px;background:linear-gradient(135deg,var(--teal-light),var(--cream));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}

.prop-body{flex:1;min-width:0;}
.prop-num-badge{display:inline-block;width:18px;height:18px;border-radius:99px;background:var(--border);color:var(--text-muted);font-size:9px;font-weight:700;text-align:center;line-height:18px;margin-bottom:3px;}
.prop-card.selected .prop-num-badge{background:var(--teal);color:white;}
.prop-title{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.25;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prop-card.selected .prop-title{color:var(--teal-dark);}
.prop-tags{display:flex;gap:6px;flex-wrap:wrap;}
.ptag{font-size:11px;color:var(--text-muted);background:var(--cream);padding:2px 8px;border-radius:99px;}
.prop-card.selected .ptag{background:rgba(29,158,117,.12);color:var(--teal-dark);}

.prop-right{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;}
.check-badge{width:28px;height:28px;border-radius:99px;background:var(--teal);color:white;font-size:13px;display:flex;align-items:center;justify-content:center;}
.view-btn{width:28px;height:28px;border-radius:99px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.view-btn:hover{background:var(--teal-light);}

/* ── SAVE BAR ── */
.save-bar{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);z-index:80;}
.save-btn{background:var(--teal);color:white;border:none;padding:14px 32px;border-radius:99px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(29,158,117,.35);transition:all .2s;}
.save-btn:hover{background:var(--teal-dark);transform:translateY(-1px);}
.save-btn:disabled{opacity:.4;transform:none;}

/* ── LOADING ── */
.loader{position:fixed;inset:0;background:rgba(247,243,237,.9);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loader.visible{display:flex;}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;}
.loader-txt{font-size:13px;color:var(--text-muted);}

/* ── FLOATING NAV ── */
.fnav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-radius:99px;padding:10px 8px;display:flex;gap:2px;box-shadow:0 8px 40px rgba(44,40,32,.20);z-index:100;border:1px solid rgba(229,221,213,.5);}
.fnb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 14px;border:none;border-radius:99px;background:transparent;cursor:pointer;transition:all .2s;min-width:52px;}
.fi{font-size:20px;line-height:1;}
.fl{font-size:9px;font-weight:600;color:var(--text-muted);}
.fnb.active{background:var(--teal);}
.fnb.active .fl{color:rgba(255,255,255,.9);}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--white);padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--teal);}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.moment-block{animation:fadeUp .3s ease both;}
</style>
</head>
<body>

<div class="loader" id="loadingOverlay">
  <div class="spin"></div>
  <div class="loader-txt" id="loaderText">Chargement…</div>
</div>
<div class="toast" id="toast"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div>
      <div class="brand">Clara</div>
      <div class="week-label" id="weekLabel">Semaine…</div>
    </div>
    <div class="top-actions">
      <button class="btn-icon" onclick="regenererSemaine()" title="Nouvelles propositions">🔀</button>
      <button class="btn-icon" onclick="goTo('profil.html')" title="Profil">👤</button>
    </div>
  </div>
  <div class="chips-row">
    <span class="chip chip-teal" id="saisonBadge">…</span>
    <span class="chip chip-gray" id="profileChip">…</span>
    <span class="chip chip-gray" id="progressChip"><strong>0</strong>/21 repas</span>
  </div>
</div>

<!-- DAY STRIP -->
<div class="days-strip"><div class="days-inner" id="daysNav"></div></div>

<!-- CONTENT -->
<div class="content" id="mainContent"></div>

<!-- SAVE BAR -->
<div class="save-bar">
  <button class="save-btn" id="saveBtn" onclick="sauvegarderSemaine()" disabled>💾 Sauvegarder la semaine</button>
</div>

<!-- FLOATING NAV -->
<nav class="fnav">
  <button class="fnb active" onclick="goTo('semainier.html')"><div class="fi">📅</div><div class="fl">Semaine</div></button>
  <button class="fnb" onclick="goTo('livre.html')"><div class="fi">📖</div><div class="fl">Recettes</div></button>
  <button class="fnb" onclick="goTo('courses.html')"><div class="fi">🛒</div><div class="fl">Courses</div></button>
  <button class="fnb" onclick="goTo('inventaire.html')"><div class="fi">📦</div><div class="fl">Stock</div></button>
  <button class="fnb" onclick="goTo('profil.html')"><div class="fi">👤</div><div class="fl">Profil</div></button>
</nav>

<script>
const SUPABASE_URL='https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';
const JOURS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MOMENTS=['Petit-Déjeuner','Déjeuner','Dîner'];
const MI={'Petit-Déjeuner':'☀️','Déjeuner':'🌤️','Dîner':'🌙'};
const SAISON_ICONS={Printemps:'🌸',Été:'☀️',Automne:'🍂',Hiver:'❄️'};
const NB_PROPS=3;
let proposals={},planning={},recettes=[],recetteIndex=new Map(),profil=null,saison='',currentJour=0;

function goTo(u){window.location.href=u;}
function getUserId(){return localStorage.getItem('clara_user_id')||'anon';}
function getWeekId(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));return l.toISOString().slice(0,10);}
function getSaison(){const m=new Date().getMonth()+1;if(m>=3&&m<=5)return'Printemps';if(m>=6&&m<=8)return'Été';if(m>=9&&m<=11)return'Automne';return'Hiver';}
function getWeekLabel(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));const di=new Date(l);di.setDate(l.getDate()+6);const fmt=x=>x.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});return fmt(l)+' – '+fmt(di);}
function loadProfil(){try{const r=localStorage.getItem('clara_profile');return r?JSON.parse(r):null;}catch(e){return null;}}

async function chargerRecettes(){
  try{const r=await fetch('recettes.json');if(r.ok){recettes=await r.json();recettes.forEach(r=>recetteIndex.set(String(r.id),r));return;}}catch(e){}
  recettes=DEMO;recettes.forEach(r=>recetteIndex.set(String(r.id),r));
}

function filtrer(moment,opts={}){
  return recettes.filter(r=>{
    if(!(r.tags?.moments||[]).includes(moment))return false;
    const nm={'Facile':1,'Moyenne':2,'Difficile':3,'Intermédiaire':2};
    const pn=nm[profil.niveau]||3,rn=nm[r.tags?.difficulte]||1;
    if(rn>pn)return false;
    if(!opts.saison){const s=r.tags?.saison||[];if(s.length&&!s.includes('Toutes')&&!s.includes(saison))return false;}
    if(!opts.budget&&profil.budget){const bm={'€':1,'€€':2,'€€€':3};if((bm[r.tags?.budget]||2)>(bm[profil.budget]||2))return false;}
    if(!opts.allergenes&&profil.allergies?.length){const al=r.tags?.allergenes||[];for(const a of profil.allergies)if(al.includes(a))return false;}
    return true;
  });
}

function piocherN(moment,n,excl=[]){
  const pools=[()=>filtrer(moment),()=>filtrer(moment,{saison:true}),()=>filtrer(moment,{saison:true,budget:true}),()=>filtrer(moment,{saison:true,budget:true,allergenes:true}),()=>recettes.filter(r=>(r.tags?.moments||[]).includes(moment))];
  const result=[],usedIds=new Set(excl);
  for(const pFn of pools){
    if(result.length>=n)break;
    const pool=pFn().filter(r=>!usedIds.has(r.id)).sort(()=>Math.random()-.5);
    for(const r of pool){if(result.length>=n)break;if(!usedIds.has(r.id)){result.push(r);usedIds.add(r.id);}}
  }
  return result;
}

function genererSemaine(){
  const allUsed=[];proposals={};planning={};
  for(const j of JOURS){proposals[j]={};planning[j]={};for(const m of MOMENTS){const p=piocherN(m,NB_PROPS,allUsed);proposals[j][m]=p;p.forEach(x=>allUsed.push(x.id));planning[j][m]=null;}}
}

function regenererSlot(jour,moment){
  const excl=[];
  for(const j of JOURS)for(const m of MOMENTS){if(j===jour&&m===moment)continue;(proposals[j]?.[m]||[]).forEach(r=>excl.push(r.id));if(planning[j]?.[m])excl.push(planning[j][m].id);}
  proposals[jour][moment]=piocherN(moment,NB_PROPS,excl);
  planning[jour][moment]=null;
  renderJour();updateProgress();
}

function regenererSemaine(){
  showLoading(true,'Nouvelles propositions…');
  setTimeout(()=>{genererSemaine();showLoading(false);renderDaysNav();renderJour();updateProgress();showToast('Nouvelles propositions ✨','success');},350);
}

function choisir(jour,moment,id){
  const props=proposals[jour]?.[moment]||[];
  const rec=props.find(r=>String(r.id)===String(id));
  if(!rec)return;
  const cur=planning[jour]?.[moment];
  planning[jour][moment]=(cur&&String(cur.id)===String(id))?null:rec;
  renderJour();updateProgress();
}

function updateProgress(){
  let count=0;
  for(const j of JOURS)for(const m of MOMENTS)if(planning[j]?.[m])count++;
  document.getElementById('progressChip').innerHTML=`<strong>${count}</strong>/21 repas`;
  document.getElementById('saveBtn').disabled=count===0;
  renderDaysNav();
}

async function sauvegarderSemaine(){
  const count=JOURS.reduce((a,j)=>a+MOMENTS.filter(m=>planning[j]?.[m]).length,0);
  if(!count){showToast('Choisissez au moins une recette');return;}
  showLoading(true,'Sauvegarde…');
  const uid=getUserId(),sem=getWeekId();
  localStorage.setItem('clara_planning_'+sem,JSON.stringify(planning));
  try{
    const rows=[];
    for(const j of JOURS)for(const m of MOMENTS){const r=planning[j]?.[m];if(r)rows.push({user_id:uid,semaine:sem,jour:j,moment:m,recette_id:String(r.id),recette_titre:r.titre,recette_emoji:r.ux?.emoji||'🍽️'});}
    await supaFetch(`/rest/v1/planning?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}`,{method:'DELETE'});
    if(rows.length)await supaFetch('/rest/v1/planning',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(rows)});
    showLoading(false);showToast('Semaine sauvegardée 💾','success');
  }catch(e){showLoading(false);showToast('Sauvegardé en local ✓','success');}
}

async function supaFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

async function chargerPlanningSupabase(){
  try{
    const uid=getUserId(),sem=getWeekId();
    const data=await supaFetch(`/rest/v1/planning?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}&select=*`);
    if(!data||!data.length)return false;
    for(const row of data){const rec=recetteIndex.get(String(row.recette_id));if(rec&&planning[row.jour]!==undefined)planning[row.jour][row.moment]=rec;}
    return true;
  }catch(e){return false;}
}

function ouvrirRecette(id){
  const r=recetteIndex.get(String(id));if(!r){showToast('Recette introuvable');return;}
  try{sessionStorage.setItem('clara_recette_courante',JSON.stringify(r));sessionStorage.setItem('clara_nb_personnes',String(profil.nb_personnes||2));window.location.href='recette.html';}catch(e){}
}

function renderDaysNav(){
  const now=new Date(),d=now.getDay(),ti=d===0?6:d-1;
  document.getElementById('daysNav').innerHTML=JOURS.map((j,i)=>{
    const dt=new Date(now);dt.setDate(now.getDate()+(i-ti));
    const choisis=MOMENTS.filter(m=>planning[j]?.[m]).length;
    const isComplete=choisis===MOMENTS.length,isActive=i===currentJour;
    return`<div class="day-card${isActive?' active':''}${isComplete&&!isActive?' complete':''}" onclick="selectJour(${i})">
      <div class="d-name">${j.slice(0,3)}</div>
      <div class="d-num">${dt.getDate()}</div>
      <div class="d-dot"></div>
    </div>`;
  }).join('');
  // Scroll to active
  setTimeout(()=>{const el=document.querySelectorAll('.day-card')[currentJour];if(el)el.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});},50);
}

function selectJour(i){currentJour=i;renderDaysNav();renderJour();}

function renderJour(){
  const jour=JOURS[currentJour];
  const html=MOMENTS.map((moment,mi)=>{
    const props=proposals[jour]?.[moment]||[];
    const choix=planning[jour]?.[moment];
    const hasChoice=!!choix;
    return`<div class="moment-block" style="animation-delay:${mi*60}ms">
      <div class="moment-hd">
        <div class="moment-title">${MI[moment]} ${moment}</div>
        <button class="regen-btn" onclick="regenererSlot('${hesc(jour)}','${hesc(moment)}')">↺ Autres</button>
      </div>
      <div class="props-list">
        ${props.map((r,idx)=>{
          const isSelected=hasChoice&&String(choix.id)===String(r.id);
          const isUnselected=hasChoice&&!isSelected;
          const e=r.ux?.emoji||'🍽️';
          const t=r.metrics?.total_time||'—';
          const b=r.tags?.budget||'€€';
          const thumbHtml=r.url_image
            ?`<div class="prop-thumb-wrap"><img src="${r.url_image}" alt="" loading="lazy" onerror="this.parentElement.outerHTML='<div class=\\'prop-emoji-box\\'>${e}</div>'"/></div>`
            :`<div class="prop-emoji-box">${e}</div>`;
          return`<div class="prop-card${isSelected?' selected':''}${isUnselected?' unselected':''}" onclick="choisir('${hesc(jour)}','${hesc(moment)}','${hesc(String(r.id))}')" style="animation-delay:${idx*40}ms">
            ${thumbHtml}
            <div class="prop-body">
              <div class="prop-num-badge">${isSelected?'✓':idx+1}</div>
              <div class="prop-title">${hesc(r.titre)}</div>
              <div class="prop-tags"><span class="ptag">⏱ ${t} min</span><span class="ptag">${b}</span></div>
            </div>
            <div class="prop-right">
              ${isSelected?'<div class="check-badge">✓</div>':''}
              <button class="view-btn" onclick="event.stopPropagation();ouvrirRecette('${hesc(String(r.id))}')">👁</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('mainContent').innerHTML=html;
}

function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showLoading(v,t){const e=document.getElementById('loadingOverlay');e.classList.toggle('visible',v);if(t)document.getElementById('loaderText').textContent=t;}
let tt;function showToast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');clearTimeout(tt);tt=setTimeout(()=>e.className='toast',2800);}

async function init(){
  showLoading(true,'Chargement…');
  profil=loadProfil();
  if(!profil){window.location.href='index.html';return;}
  document.getElementById('weekLabel').textContent=getWeekLabel();
  saison=getSaison();
  document.getElementById('saisonBadge').textContent=(SAISON_ICONS[saison]||'🌿')+' '+saison;
  document.getElementById('profileChip').textContent='👤 '+(profil.prenom||'Vous')+' · '+(profil.nb_personnes||2)+' pers.';
  showLoading(true,'Recettes…');
  await chargerRecettes();
  genererSemaine();
  const sem=getWeekId(),cached=localStorage.getItem('clara_planning_'+sem);
  if(cached){
    try{
      const saved=JSON.parse(cached);
      for(const j of JOURS)for(const m of MOMENTS){const s=saved[j]?.[m];if(s){const inP=(proposals[j]?.[m]||[]).some(p=>String(p.id)===String(s.id));if(!inP){proposals[j][m].unshift(s);if(proposals[j][m].length>NB_PROPS)proposals[j][m]=proposals[j][m].slice(0,NB_PROPS);}planning[j][m]=recetteIndex.get(String(s.id))||s;}}
    }catch(e){}
  }else{await chargerPlanningSupabase();}
  showLoading(false);
  const now=new Date(),d=now.getDay();currentJour=d===0?6:d-1;
  renderDaysNav();renderJour();updateProgress();
}
