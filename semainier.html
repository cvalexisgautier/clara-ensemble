  <style>
    :root{
      --cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;
      --coral:#D85A30;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;
      --white:#fff;--nav-h:68px;--radius:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;}
    body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:calc(var(--nav-h)+16px);}
    .page{max-width:480px;margin:0 auto;padding:0 16px;}

    /* ── Header ── */
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px;position:sticky;top:0;z-index:20;background:var(--cream);}
    .brand{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--teal);}
    .week-label{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .header-actions{display:flex;gap:8px;}
    .icon-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;}
    .icon-btn:hover{border-color:var(--teal);background:var(--teal-light);}

    /* ── Info bar ── */
    .info-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .saison-badge{padding:6px 12px;border-radius:99px;background:var(--teal-light);border:1.5px solid rgba(29,158,117,.2);font-size:12px;font-weight:600;color:var(--teal);}
    .profile-chip{padding:6px 12px;border-radius:99px;background:var(--white);border:1.5px solid var(--border);font-size:12px;color:var(--text-muted);}
    .progress-chip{padding:6px 12px;border-radius:99px;background:var(--white);border:1.5px solid var(--border);font-size:12px;color:var(--text-muted);}
    .progress-chip strong{color:var(--teal);}

    /* ── Navigation jours ── */
    .days-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
    .days-nav::-webkit-scrollbar{display:none;}
    .day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding:8px 12px;border-radius:10px;background:var(--white);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;min-width:52px;position:relative;}
    .day-tab.active{background:var(--teal);border-color:var(--teal);}
    .day-tab.complete{border-color:var(--teal);}
    .day-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);}
    .day-tab.active .day-name{color:rgba(255,255,255,.8);}
    .day-num{font-size:16px;font-weight:700;color:var(--text);margin-top:2px;}
    .day-tab.active .day-num{color:var(--white);}
    .day-check{position:absolute;top:4px;right:4px;font-size:9px;color:var(--teal);}
    .day-tab.active .day-check{color:white;}

    /* ── Moment section ── */
    .moment-section{margin-bottom:24px;}
    .moment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .moment-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
    .moment-refresh{padding:5px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);font-size:11px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .moment-refresh:hover{border-color:var(--teal);color:var(--teal);}
    .moment-refresh.spinning svg{animation:spin .5s linear infinite;}

    /* ── Cards de proposition ── */
    .proposals-list{display:flex;flex-direction:column;gap:8px;}

    /* Card non sélectionnée */
    .prop-card{
      background:var(--white);
      border:1.5px solid var(--border);
      border-radius:var(--radius);
      padding:12px 14px;
      display:flex;align-items:center;gap:10px;
      cursor:pointer;
      transition:all .25s;
      position:relative;
      overflow:hidden;
    }
    .prop-card:hover{border-color:var(--teal);transform:translateX(2px);}
    .prop-card.selected{
      border-color:var(--teal);
      background:var(--teal-light);
      transform:none;
    }
    .prop-card.selected::before{
      content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
      background:var(--teal);border-radius:0;
    }
    .prop-card.unselected{opacity:.5;}
    .prop-card.unselected:hover{opacity:.8;border-color:var(--teal);}

    /* Numéro de proposition */
    .prop-num{
      width:24px;height:24px;border-radius:50%;
      background:var(--cream);border:1.5px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:var(--text-muted);
      flex-shrink:0;transition:all .25s;
    }
    .prop-card.selected .prop-num{
      background:var(--teal);border-color:var(--teal);color:white;
    }
    .prop-card.selected .prop-num::after{content:'✓';}
    .prop-card:not(.selected) .prop-num-text{display:block;}
    .prop-card.selected .prop-num-text{display:none;}

    .prop-emoji{font-size:26px;flex-shrink:0;line-height:1;}
    .prop-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;}
    .prop-info{flex:1;min-width:0;}
    .prop-titre{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
    .prop-card.selected .prop-titre{color:var(--teal-dark);}
    .prop-meta{display:flex;gap:6px;}
    .meta-tag{font-size:11px;color:var(--text-muted);background:var(--cream);padding:2px 7px;border-radius:99px;}
    .prop-card.selected .meta-tag{background:rgba(29,158,117,.12);color:var(--teal-dark);}

    /* Badge "Votre choix" */
    .selected-badge{
      font-size:10px;font-weight:700;letter-spacing:.5px;
      color:var(--teal);background:rgba(29,158,117,.12);
      padding:3px 8px;border-radius:99px;flex-shrink:0;
      white-space:nowrap;
    }

    /* ── CTAs ── */
    .cta-row{display:flex;gap:10px;margin-bottom:16px;}
    .cta-btn{flex:1;padding:15px 12px;border-radius:var(--radius);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;}
    .cta-btn.primary{background:var(--teal);color:var(--white);}
    .cta-btn.primary:hover{background:var(--teal-dark);}
    .cta-btn.secondary{background:var(--white);color:var(--text);border:1.5px solid var(--border);}
    .cta-btn.secondary:hover{border-color:var(--teal);color:var(--teal);}
    .cta-btn:active{transform:scale(.98);}
    .cta-btn:disabled{opacity:.4;cursor:not-allowed;}

    /* ── Bottom nav ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1.5px solid var(--border);display:flex;align-items:center;padding:0 4px;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;cursor:pointer;border-radius:10px;transition:all .2s;border:none;background:none;}
    .nav-icon{font-size:19px;line-height:1;}
    .nav-label{font-size:9px;font-weight:600;color:var(--text-muted);}
    .nav-item.active .nav-label{color:var(--teal);}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);opacity:0;}
    .nav-item.active .nav-dot{opacity:1;}

    /* ── Loading & Toast ── */
    .loading-overlay{position:fixed;inset:0;z-index:200;background:rgba(247,243,237,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s;}
    .loading-overlay.visible{opacity:1;pointer-events:all;}
    .loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
    .loader-text{font-family:'Lora',serif;font-size:14px;color:var(--text-muted);font-style:italic;}
    .toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--white);padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:300;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .toast.success{background:var(--teal);}

    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    .prop-card{animation:fadeUp .25s ease both;}
  </style>
</head>

<script>
const SUPABASE_URL='https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';

const JOURS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const MOMENTS=['Petit-Déjeuner','Déjeuner','Dîner'];
const MI={'Petit-Déjeuner':'☀️','Déjeuner':'🌤️','Dîner':'🌙'};
const SAISON_ICONS={Printemps:'🌸',Été:'☀️',Automne:'🍂',Hiver:'❄️'};
const NB_PROPS = 3; // Nombre de propositions par slot

// ── STATE ──
// proposals[jour][moment] = [recette1, recette2, recette3]
// planning[jour][moment]  = recette choisie (ou null)
let proposals = {};
let planning  = {};
let recettes  = [];
const recetteIndex = new Map();
let profil = null;
let saison = '';
let currentJour = 0;

function goTo(u){window.location.href=u;}
function getUserId(){return localStorage.getItem('clara_user_id')||'anon';}
function getWeekId(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));return l.toISOString().slice(0,10);}
function getSaison(){const m=new Date().getMonth()+1;if(m>=3&&m<=5)return'Printemps';if(m>=6&&m<=8)return'Été';if(m>=9&&m<=11)return'Automne';return'Hiver';}
function getWeekLabel(){const n=new Date(),d=n.getDay(),l=new Date(n);l.setDate(n.getDate()-d+(d===0?-6:1));const di=new Date(l);di.setDate(l.getDate()+6);const fmt=x=>x.toLocaleDateString('fr-FR',{day:'numeric',month:'long'});return fmt(l)+' – '+fmt(di);}

// ── PROFIL ──
function loadProfil(){try{const r=localStorage.getItem('clara_profile');return r?JSON.parse(r):null;}catch(e){return null;}}

// ── RECETTES ──
async function chargerRecettes(){
  try{
    const r=await fetch('recettes.json');
    if(r.ok){recettes=await r.json();recettes.forEach(r=>recetteIndex.set(String(r.id),r));return;}
  }catch(e){}
  recettes=DEMO;recettes.forEach(r=>recetteIndex.set(String(r.id),r));
}

// ── FILTRAGE ──
function filtrer(moment,opts={}){
  return recettes.filter(r=>{
    if(!(r.tags?.moments||[]).includes(moment))return false;
    const nm={'Facile':1,'Moyenne':2,'Difficile':3,'Intermédiaire':2};
    const pn=nm[profil.niveau]||3,rn=nm[r.tags?.difficulte]||1;
    if(rn>pn)return false;
    if(!opts.saison){const s=r.tags?.saison||[];if(s.length&&!s.includes('Toutes')&&!s.includes(saison))return false;}
    if(!opts.budget&&profil.budget){const bm={'€':1,'€€':2,'€€€':3};if((bm[r.tags?.budget]||2)>(bm[profil.budget]||2))return false;}
    if(!opts.allergenes&&profil.allergies?.length){const al=r.tags?.allergenes||[];for(const a of profil.allergies)if(al.includes(a))return false;}
    return true;
  });
}

function piocherN(moment, n, excl=[]){
  // Récupère n recettes distinctes en cascade de filtres
  const pools = [
    ()=>filtrer(moment),
    ()=>filtrer(moment,{saison:true}),
    ()=>filtrer(moment,{saison:true,budget:true}),
    ()=>filtrer(moment,{saison:true,budget:true,allergenes:true}),
    ()=>recettes.filter(r=>(r.tags?.moments||[]).includes(moment))
  ];

  const result = [];
  const usedIds = new Set(excl);

  for(const poolFn of pools){
    if(result.length >= n) break;
    const pool = poolFn().filter(r=>!usedIds.has(r.id));
    // Mélanger le pool
    const shuffled = pool.sort(()=>Math.random()-.5);
    for(const r of shuffled){
      if(result.length >= n) break;
      if(!usedIds.has(r.id)){ result.push(r); usedIds.add(r.id); }
    }
  }
  return result;
}

// ── GÉNÉRATION SEMAINE COMPLÈTE ──
function genererSemaine(){
  const allUsed = [];
  proposals={};planning={};
  for(const j of JOURS){
    proposals[j]={};planning[j]={};
    for(const m of MOMENTS){
      const props = piocherN(m, NB_PROPS, allUsed);
      proposals[j][m] = props;
      props.forEach(p=>allUsed.push(p.id));
      planning[j][m] = null; // Aucun choix initial
    }
  }
}

// ── RÉGÉNÉRER UN SLOT (3 nouvelles propositions) ──
function regenererSlot(jour, moment){
  // Exclure tout ce qui est déjà proposé ou choisi ailleurs
  const excl = [];
  for(const j of JOURS){
    for(const m of MOMENTS){
      if(j===jour && m===moment) continue;
      (proposals[j]?.[m]||[]).forEach(r=>excl.push(r.id));
      if(planning[j]?.[m]) excl.push(planning[j][m].id);
    }
  }
  const newProps = piocherN(moment, NB_PROPS, excl);
  proposals[jour][moment] = newProps;
  planning[jour][moment] = null; // Reset choix
  renderJour();
  updateProgress();
}

function regenererSemaine(){
  showLoading(true,'Nouvelles propositions…');
  setTimeout(()=>{
    genererSemaine();
    showLoading(false);
    renderDaysNav();
    renderJour();
    updateProgress();
    showToast('Nouvelles propositions générées ✨','success');
  },350);
}

// ── CHOIX UTILISATEUR ──
function choisir(jour, moment, recetteId){
  const props = proposals[jour]?.[moment]||[];
  const recette = props.find(r=>String(r.id)===String(recetteId));
  if(!recette) return;

  // Toggle : re-cliquer désélectionne
  const current = planning[jour]?.[moment];
  if(current && String(current.id)===String(recetteId)){
    planning[jour][moment] = null;
  } else {
    planning[jour][moment] = recette;
  }

  renderJour();
  updateProgress();
}

// ── PROGRESS ──
function updateProgress(){
  let count = 0;
  for(const j of JOURS) for(const m of MOMENTS) if(planning[j]?.[m]) count++;
  document.getElementById('progressChip').innerHTML = `<strong>${count}</strong>/21 repas choisis`;
  document.getElementById('saveBtn').disabled = count === 0;
  renderDaysNav(); // Mettre à jour les ✓ sur les onglets jours
}

// ── SAUVEGARDE ──
async function sauvegarderSemaine(){
  const choixCount = JOURS.reduce((acc,j)=>acc+MOMENTS.filter(m=>planning[j]?.[m]).length,0);
  if(choixCount===0){showToast('Choisissez au moins une recette');return;}

  showLoading(true,'Sauvegarde…');
  const uid=getUserId(),sem=getWeekId();

  // localStorage (planning complet des choix)
  localStorage.setItem('clara_planning_'+sem, JSON.stringify(planning));

  // Supabase
  try{
    const rows=[];
    for(const j of JOURS) for(const m of MOMENTS){
      const r=planning[j]?.[m];
      if(r) rows.push({user_id:uid,semaine:sem,jour:j,moment:m,recette_id:String(r.id),recette_titre:r.titre,recette_emoji:r.ux?.emoji||'🍽️'});
    }
    await supaFetch(`/rest/v1/planning?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}`,{method:'DELETE'});
    if(rows.length) await supaFetch('/rest/v1/planning',{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify(rows)});
    showLoading(false);showToast('Semaine sauvegardée 💾','success');
  }catch(e){
    showLoading(false);showToast('Sauvegardé en local ✓','success');
  }
}

// ── SUPABASE ──
async function supaFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

async function chargerPlanningSupabase(){
  try{
    const uid=getUserId(),sem=getWeekId();
    const data=await supaFetch(`/rest/v1/planning?user_id=eq.${encodeURIComponent(uid)}&semaine=eq.${sem}&select=*`);
    if(!data||!data.length)return false;
    for(const row of data){
      const rec=recetteIndex.get(String(row.recette_id));
      if(rec && planning[row.jour]!==undefined){ planning[row.jour][row.moment]=rec; }
    }
    return true;
  }catch(e){return false;}
}

// ── NAVIGATION RECETTE ──
function ouvrirRecette(id){
  const r=recetteIndex.get(String(id));
  if(!r){showToast('Recette introuvable');return;}
  try{
    sessionStorage.setItem('clara_recette_courante',JSON.stringify(r));
    sessionStorage.setItem('clara_nb_personnes',String(profil.nb_personnes||2));
    window.location.href='recette.html';
  }catch(e){}
}

// ── RENDU JOURS ──
function renderDaysNav(){
  const now=new Date(),d=now.getDay(),ti=d===0?6:d-1;
  document.getElementById('daysNav').innerHTML=JOURS.map((j,i)=>{
    const dt=new Date(now);dt.setDate(now.getDate()+(i-ti));
    const choisis=MOMENTS.filter(m=>planning[j]?.[m]).length;
    const isComplete=choisis===MOMENTS.length;
    const isActive=i===currentJour;
    return`<div class="day-tab${isActive?' active':''}${isComplete&&!isActive?' complete':''}" onclick="selectJour(${i})">
      ${isComplete?`<div class="day-check">✓</div>`:''}
      <div class="day-name">${j.slice(0,3)}</div>
      <div class="day-num">${dt.getDate()}</div>
    </div>`;
  }).join('');
}

function selectJour(i){currentJour=i;renderDaysNav();renderJour();}

// ── RENDU JOUR COURANT ──
function renderJour(){
  const jour=JOURS[currentJour];
  const html=MOMENTS.map(moment=>{
    const props=proposals[jour]?.[moment]||[];
    const choix=planning[jour]?.[moment];
    const hasChoice=!!choix;

    return`<div class="moment-section">
      <div class="moment-header">
        <div class="moment-label">${MI[moment]} ${moment}</div>
        <button class="moment-refresh" onclick="regenererSlot('${hesc(jour)}','${hesc(moment)}')">↺ Nouvelles propositions</button>
      </div>
      <div class="proposals-list">
        ${props.map((r,idx)=>{
          const isSelected = hasChoice && String(choix.id)===String(r.id);
          const isUnselected = hasChoice && !isSelected;
          const t=r.metrics?.total_time||'—';
          const b=r.tags?.budget||'€€';
          const e=r.ux?.emoji||'🍽️';
          const thumbHtml=r.url_image
            ?`<img class="prop-thumb" src="${r.url_image}" alt="${hesc(r.titre)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='block'"><div class="prop-emoji" style="display:none">${e}</div>`
            :`<div class="prop-emoji">${e}</div>`;
          return`<div class="prop-card${isSelected?' selected':''}${isUnselected?' unselected':''}"
            onclick="choisir('${hesc(jour)}','${hesc(moment)}','${hesc(String(r.id))}')"
            style="animation-delay:${idx*60}ms">
            <div class="prop-num">
              <span class="prop-num-text">${idx+1}</span>
            </div>
            ${thumbHtml}
            <div class="prop-info">
              <div class="prop-titre">${hesc(r.titre)}</div>
              <div class="prop-meta">
                <span class="meta-tag">⏱ ${t} min</span>
                <span class="meta-tag">${b}</span>
              </div>
            </div>
            ${isSelected?'<div class="selected-badge">✓ Choisi</div>':''}
            <button style="width:28px;height:28px;border-radius:50%;border:none;background:transparent;font-size:14px;cursor:pointer;color:var(--text-muted);flex-shrink:0;"
              onclick="event.stopPropagation();ouvrirRecette('${hesc(String(r.id))}')">👁</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML=html;
}

function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showLoading(v,t){const e=document.getElementById('loadingOverlay');e.classList.toggle('visible',v);if(t)document.getElementById('loaderText').textContent=t;}
let tt;function showToast(m,t=''){const e=document.getElementById('toast');e.textContent=m;e.className='toast show'+(t?' '+t:'');clearTimeout(tt);tt=setTimeout(()=>e.className='toast',2800);}

// ── INIT ──
async function init(){
  showLoading(true,'Chargement du profil…');
  profil=loadProfil();
  if(!profil){window.location.href='index.html';return;}
  document.getElementById('weekLabel').textContent=getWeekLabel();
  saison=getSaison();
  document.getElementById('saisonBadge').textContent=(SAISON_ICONS[saison]||'🌿')+' '+saison;
  document.getElementById('profileChip').textContent='👤 '+(profil.prenom||'Vous')+' · '+(profil.nb_personnes||2)+' pers.';

  showLoading(true,'Chargement des recettes…');
  await chargerRecettes();

  showLoading(true,'Génération des propositions…');
  // Générer les 3 propositions par slot
  genererSemaine();

  // Charger les choix déjà sauvegardés
  const sem=getWeekId();
  const cached=localStorage.getItem('clara_planning_'+sem);
  if(cached){
    try{
      const savedPlanning=JSON.parse(cached);
      // Restaurer les choix dans le planning
      for(const j of JOURS) for(const m of MOMENTS){
        const saved=savedPlanning[j]?.[m];
        if(saved){
          // S'assurer que la recette sauvegardée est dans les propositions
          const isInProps = (proposals[j]?.[m]||[]).some(p=>String(p.id)===String(saved.id));
          if(!isInProps){
            // L'ajouter comme 1ère proposition
            proposals[j][m].unshift(saved);
            if(proposals[j][m].length>NB_PROPS) proposals[j][m]=proposals[j][m].slice(0,NB_PROPS);
          }
          planning[j][m]=recetteIndex.get(String(saved.id))||saved;
        }
      }
    }catch(e){}
  } else {
    // Essayer Supabase
    await chargerPlanningSupabase();
  }

  showLoading(false);
  const now=new Date(),d=now.getDay();
  currentJour=d===0?6:d-1;
  renderDaysNav();
  renderJour();
  updateProgress();
}
