<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Clara — Livre de Recettes</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;
      --coral:#D85A30;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;
      --white:#FFFFFF;--nav-h:68px;--radius:16px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:calc(var(--nav-h)+24px);}

    /* ── HEADER ── */
    .header{padding:20px 16px 0;position:sticky;top:0;z-index:30;background:var(--cream);}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .brand{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--teal);}
    .count-chip{font-size:12px;color:var(--text-muted);background:var(--white);border:1.5px solid var(--border);padding:5px 12px;border-radius:99px;}

    /* ── SEARCH ── */
    .search-bar{position:relative;margin-bottom:10px;}
    .search-input{width:100%;padding:11px 16px 11px 40px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:var(--teal);}
    .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

    /* ── FILTRES ── */
    .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .filters::-webkit-scrollbar{display:none;}
    .filter-btn{flex-shrink:0;padding:7px 14px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .filter-btn.active{background:var(--teal);border-color:var(--teal);color:var(--white);}

    /* ── FEATURED (grande carte hero) ── */
    .featured{margin:12px 16px 0;border-radius:20px;overflow:hidden;position:relative;height:300px;cursor:pointer;box-shadow:0 8px 32px rgba(29,158,117,.15);}
    .featured-img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
    .featured:hover .featured-img{transform:scale(1.03);}
    .featured-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(20,15,10,.8) 100%);}
    .featured-label{position:absolute;top:14px;left:14px;background:var(--teal);color:white;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border-radius:99px;}
    .featured-content{position:absolute;bottom:0;left:0;right:0;padding:20px;}
    .featured-badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
    .featured-badge{padding:4px 10px;border-radius:99px;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);color:rgba(255,255,255,.9);font-size:11px;font-weight:500;}
    .featured-titre{font-family:'Lora',serif;font-size:22px;font-weight:600;color:white;line-height:1.25;text-shadow:0 1px 4px rgba(0,0,0,.3);}
    .featured-emoji{position:absolute;top:14px;right:14px;font-size:32px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}

    /* ── SECTION TITLE ── */
    .section-header{display:flex;align-items:baseline;justify-content:space-between;padding:20px 16px 10px;}
    .section-title{font-family:'Lora',serif;font-size:18px;font-weight:600;color:var(--text);}
    .section-sub{font-size:12px;color:var(--text-muted);}

    /* ── GRILLE ── */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}

    /* ── CARTE ── */
    .card{border-radius:var(--radius);overflow:hidden;background:var(--white);cursor:pointer;position:relative;box-shadow:0 2px 12px rgba(44,40,32,.06);transition:transform .25s ease,box-shadow .25s ease;animation:fadeUp .35s ease both;}
    .card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(44,40,32,.12);}
    .card.wide{grid-column:span 2;}
    .card-img-wrap{position:relative;overflow:hidden;}
    .card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .4s ease;}
    .card:hover .card-img{transform:scale(1.05);}
    .card.wide .card-img{aspect-ratio:16/7;}
    .card-emoji-fallback{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,var(--teal-light) 0%,var(--cream) 100%);}
    .card.wide .card-emoji-fallback{aspect-ratio:16/7;}
    .card-badge-img{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border-radius:99px;padding:3px 8px;font-size:10px;font-weight:600;color:var(--teal);}
    .card-body{padding:10px 12px 12px;}
    .card-cuisine{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--teal);margin-bottom:4px;}
    .card-titre{font-family:'Lora',serif;font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;}
    .card.wide .card-titre{font-size:16px;}
    .card-meta{display:flex;gap:8px;align-items:center;}
    .meta-item{font-size:11px;color:var(--text-muted);}

    /* ── LISTE (vue alternative) ── */
    .list-view{display:flex;flex-direction:column;gap:8px;padding:0 16px;}
    .list-card{display:flex;gap:12px;align-items:center;background:var(--white);border-radius:14px;padding:10px;cursor:pointer;box-shadow:0 2px 8px rgba(44,40,32,.05);transition:all .2s;animation:fadeUp .3s ease both;}
    .list-card:hover{box-shadow:0 4px 16px rgba(44,40,32,.1);}
    .list-thumb{width:64px;height:64px;border-radius:12px;object-fit:cover;flex-shrink:0;}
    .list-emoji{width:64px;height:64px;border-radius:12px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
    .list-info{flex:1;min-width:0;}
    .list-titre{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .list-meta{font-size:11px;color:var(--text-muted);}
    .list-budget{font-size:12px;font-weight:600;color:var(--teal);flex-shrink:0;}

    /* ── TOGGLE VIEW ── */
    .view-toggle{display:flex;gap:4px;background:var(--border);border-radius:8px;padding:3px;}
    .view-btn{width:30px;height:26px;border:none;background:transparent;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
    .view-btn.active{background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.1);}

    /* ── EMPTY / LOADING ── */
    .loading{text-align:center;padding:48px 20px;color:var(--text-muted);}
    .loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    .empty-state{text-align:center;padding:48px 20px;}
    .empty-icon{font-size:48px;margin-bottom:12px;}
    .empty-title{font-family:'Lora',serif;font-size:18px;font-weight:600;margin-bottom:8px;}
    .empty-sub{font-size:13px;color:var(--text-muted);line-height:1.5;}

    /* ── NAV ── */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1.5px solid var(--border);display:flex;align-items:center;padding:0 4px;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;cursor:pointer;border-radius:10px;transition:all .2s;border:none;background:none;}
    .nav-icon{font-size:20px;line-height:1;}
    .nav-label{font-size:9px;font-weight:600;color:var(--text-muted);}
    .nav-item.active .nav-label{color:var(--teal);}
    .nav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal);opacity:0;}
    .nav-item.active .nav-dot{opacity:1;}

    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="brand">📖 Livre de Recettes</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="count-chip" id="countChip">…</span>
      <div class="view-toggle">
        <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grille">⊞</button>
        <button class="view-btn" id="btnList" onclick="setView('list')" title="Liste">☰</button>
      </div>
    </div>
  </div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Rechercher une recette…" oninput="onSearch()"/>
  </div>
  <div class="filters" id="filtersBar"></div>
</div>

<!-- CONTENU -->
<div id="mainContent">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>Chargement des recettes…</div>
  </div>
</div>

<!-- NAV -->
<nav class="bottom-nav">
  <button class="nav-item" onclick="goTo('index.html')"><div class="nav-icon">🏠</div><div class="nav-label">Accueil</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('semainier.html')"><div class="nav-icon">📅</div><div class="nav-label">Semainier</div><div class="nav-dot"></div></button>
  <button class="nav-item active"><div class="nav-icon">📖</div><div class="nav-label">Livre</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('courses.html')"><div class="nav-icon">🛒</div><div class="nav-label">Courses</div><div class="nav-dot"></div></button>
  <button class="nav-item" onclick="goTo('profil.html')"><div class="nav-icon">👤</div><div class="nav-label">Profil</div><div class="nav-dot"></div></button>
</nav>

<script>
const SUPABASE_URL = 'https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';

let toutesRecettes = [];
let recettesFiltrees = [];
let filtreActif = 'Toutes';
let searchQuery = '';
let viewMode = 'grid';

function goTo(u){ window.location.href = u; }
function hesc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── CHARGEMENT SUPABASE ──
async function chargerRecettes() {
  try {
    // Charger toutes les recettes (avec et sans image)
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/recettes?select=id,titre,description,emoji,budget,difficulte,saisons,moments,url_image,prep_time,cook_time,total_time,ingredients&order=created_at.desc&limit=500',
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    if (!res.ok) throw new Error('Erreur Supabase ' + res.status);
    const data = await res.json();

    // Séparer recettes avec et sans image, mettre celles avec image en premier
    const avecImg  = data.filter(r => r.url_image);
    const sansImg  = data.filter(r => !r.url_image);
    toutesRecettes = [...avecImg, ...sansImg];

    construiresFiltres();
    appliquerFiltres();
  } catch(e) {
    // Fallback sur recettes.json si Supabase inaccessible
    try {
      const res = await fetch('recettes.json');
      const data = await res.json();
      toutesRecettes = data.map(r => ({
        id: r.id, titre: r.titre, description: r.description,
        emoji: r.ux?.emoji || '🍽️', budget: r.tags?.budget,
        difficulte: r.tags?.difficulte, saisons: r.tags?.saison || [],
        moments: r.tags?.moments || [], url_image: r.url_image || null,
        total_time: r.metrics?.total_time, ingredients: r.ingredients || []
      }));
      construiresFiltres();
      appliquerFiltres();
    } catch(e2) {
      document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Impossible de charger les recettes</div></div>`;
    }
  }
}

// ── FILTRES DYNAMIQUES ──
function construiresFiltres() {
  const saisons = ['Toutes', ...new Set(toutesRecettes.flatMap(r => r.saisons || []).filter(Boolean))];
  const avecImg = toutesRecettes.filter(r => r.url_image).length;
  document.getElementById('filtersBar').innerHTML =
    `<button class="filter-btn active" onclick="setFiltre('Toutes')">Toutes (${toutesRecettes.length})</button>` +
    (avecImg > 0 ? `<button class="filter-btn" onclick="setFiltre('📷')">📷 Avec photo (${avecImg})</button>` : '') +
    saisons.filter(s => s !== 'Toutes').map(s =>
      `<button class="filter-btn" onclick="setFiltre('${hesc(s)}')">${saisonIcon(s)} ${hesc(s)}</button>`
    ).join('') +
    ['€','€€','€€€'].map(b =>
      `<button class="filter-btn" onclick="setFiltre('${b}')">${b}</button>`
    ).join('');
}

function saisonIcon(s){ return {'Été':'☀️','Hiver':'❄️','Printemps':'🌸','Automne':'🍂'}[s]||'🌿'; }

function setFiltre(f) {
  filtreActif = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim().startsWith(f) || (f === 'Toutes' && b.textContent.includes('Toutes')));
  });
  appliquerFiltres();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  appliquerFiltres();
}

function appliquerFiltres() {
  let r = [...toutesRecettes];
  if (filtreActif === '📷') r = r.filter(x => x.url_image);
  else if (filtreActif === '€' || filtreActif === '€€' || filtreActif === '€€€') r = r.filter(x => x.budget === filtreActif);
  else if (filtreActif !== 'Toutes') r = r.filter(x => (x.saisons||[]).includes(filtreActif));
  if (searchQuery) r = r.filter(x => x.titre.toLowerCase().includes(searchQuery) || (x.description||'').toLowerCase().includes(searchQuery));
  recettesFiltrees = r;
  document.getElementById('countChip').textContent = r.length + ' recette' + (r.length > 1 ? 's' : '');
  render();
}

// ── RENDU ──
function setView(v) {
  viewMode = v;
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  render();
}

function render() {
  const el = document.getElementById('mainContent');
  if (recettesFiltrees.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🍽️</div>
      <div class="empty-title">Aucune recette trouvée</div>
      <div class="empty-sub">Essayez un autre filtre ou modifiez votre recherche.</div>
    </div>`;
    return;
  }
  if (viewMode === 'list') { renderList(el); return; }
  renderGrid(el);
}

function renderGrid(el) {
  const recettes = recettesFiltrees;
  let html = '';

  // ── FEATURED : première recette avec image ──
  const starred = recettes.find(r => r.url_image);
  if (starred && !searchQuery) {
    html += `<div class="featured" onclick="ouvrirRecette('${hesc(starred.id)}')">
      <img class="featured-img" src="${hesc(starred.url_image)}" alt="${hesc(starred.titre)}"
           onerror="this.parentElement.style.background='var(--teal)';this.style.display='none'"/>
      <div class="featured-overlay"></div>
      <div class="featured-label">⭐ À la une</div>
      <div class="featured-emoji">${starred.emoji||'🍽️'}</div>
      <div class="featured-content">
        <div class="featured-badges">
          ${starred.total_time ? `<span class="featured-badge">⏱ ${starred.total_time} min</span>` : ''}
          ${starred.budget ? `<span class="featured-badge">${starred.budget}</span>` : ''}
          ${starred.difficulte ? `<span class="featured-badge">${starred.difficulte}</span>` : ''}
        </div>
        <div class="featured-titre">${hesc(starred.titre)}</div>
      </div>
    </div>`;
  }

  // ── GRILLE DES AUTRES ──
  const reste = starred && !searchQuery ? recettes.filter(r => r.id !== starred.id) : recettes;

  if (reste.length > 0) {
    html += `<div class="section-header">
      <div class="section-title">${searchQuery ? '🔍 Résultats' : 'Toutes les recettes'}</div>
      <div class="section-sub">${reste.length} recette${reste.length>1?'s':''}</div>
    </div>`;
    html += `<div class="grid">`;

    reste.forEach((r, idx) => {
      const isWide = !r.url_image && idx % 7 === 0;
      const delay  = (idx % 10) * 40;
      const imgBlock = r.url_image
        ? `<div class="card-img-wrap">
            <img class="card-img" src="${hesc(r.url_image)}" alt="${hesc(r.titre)}" loading="lazy"
                 onerror="this.parentElement.innerHTML='<div class=\\'card-emoji-fallback\\'>${r.emoji||'🍽️'}</div>'"/>
            <span class="card-badge-img">${r.budget||'€€'}</span>
           </div>`
        : `<div class="card-emoji-fallback">${r.emoji||'🍽️'}</div>`;

      html += `<div class="card${isWide?' wide':''}" style="animation-delay:${delay}ms"
                 onclick="ouvrirRecette('${hesc(r.id)}')">
        ${imgBlock}
        <div class="card-body">
          <div class="card-cuisine">${(r.saisons||[]).join(' · ')||'Toutes saisons'}</div>
          <div class="card-titre">${hesc(r.titre)}</div>
          <div class="card-meta">
            ${r.total_time ? `<span class="meta-item">⏱ ${r.total_time} min</span>` : ''}
            ${r.difficulte ? `<span class="meta-item">· ${r.difficulte}</span>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}

function renderList(el) {
  let html = `<div style="height:12px"></div><div class="list-view">`;
  recettesFiltrees.forEach((r, idx) => {
    const delay = (idx % 15) * 30;
    const thumb = r.url_image
      ? `<img class="list-thumb" src="${hesc(r.url_image)}" alt="${hesc(r.titre)}" loading="lazy"
             onerror="this.outerHTML='<div class=\\'list-emoji\\'>${r.emoji||'🍽️'}</div>'"/>`
      : `<div class="list-emoji">${r.emoji||'🍽️'}</div>`;
    html += `<div class="list-card" style="animation-delay:${delay}ms" onclick="ouvrirRecette('${hesc(r.id)}')">
      ${thumb}
      <div class="list-info">
        <div class="list-titre">${hesc(r.titre)}</div>
        <div class="list-meta">${r.total_time ? '⏱ '+r.total_time+' min · ' : ''}${r.difficulte||''}</div>
      </div>
      <div class="list-budget">${r.budget||'€€'}</div>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

// ── OUVERTURE RECETTE ──
async function ouvrirRecette(id) {
  // Charger les détails complets depuis Supabase
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/recettes?id=eq.' + encodeURIComponent(id) + '&select=*',
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    const data = await res.json();
    if (data && data[0]) {
      const r = data[0];
      // Convertir au format attendu par recette.html
      sessionStorage.setItem('clara_recette_courante', JSON.stringify({
        id: r.id, titre: r.titre, description: r.description,
        personnes: r.personnes || 4,
        ingredients: r.ingredients || [],
        etapes: r.etapes || [],
        url_image: r.url_image || null,
        tags: { saison: r.saisons||[], budget: r.budget, difficulte: r.difficulte, moments: r.moments||[], allergenes: r.allergenes||[] },
        metrics: { prep_time: r.prep_time||0, cook_time: r.cook_time||0, total_time: r.total_time||0 },
        ux: { emoji: r.emoji||'🍽️', mood: r.mood||'' }
      }));
      sessionStorage.setItem('clara_nb_personnes', String(loadProfil()?.nb_personnes || 2));
      goTo('recette.html');
    }
  } catch(e) {
    // Fallback : chercher dans recettes locales
    const r = toutesRecettes.find(x => String(x.id) === String(id));
    if (r) {
      sessionStorage.setItem('clara_recette_courante', JSON.stringify(r));
      goTo('recette.html');
    }
  }
}

function loadProfil(){ try{ const r=localStorage.getItem('clara_profile'); return r?JSON.parse(r):null; }catch(e){return null;} }

// ── INIT ──
chargerRecettes();
</script>
</body>
</html>
