<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Clara — Recettes</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#F7F3ED;--teal:#1D9E75;--teal-light:#E8F5F0;--teal-dark:#157A5A;--coral:#D85A30;--text:#2C2820;--text-muted:#8B7D72;--border:#E5DDD5;--white:#FFFFFF;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);padding-bottom:100px;}

/* TOP */
.topbar{padding:20px 20px 0;position:sticky;top:0;z-index:30;background:var(--cream);}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.brand{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--text);}
.brand span{color:var(--teal);}
.count-chip{font-size:12px;color:var(--text-muted);background:var(--white);border:1.5px solid var(--border);padding:5px 12px;border-radius:99px;}
.view-toggle{display:flex;gap:3px;background:var(--border);border-radius:10px;padding:3px;}
.vbtn{width:30px;height:26px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.vbtn.on{background:var(--white);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.search-input{width:100%;padding:12px 14px 12px 42px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.search-input:focus{border-color:var(--teal);}

/* FILTERS */
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:8px 16px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.fbtn.on{background:var(--teal);border-color:var(--teal);color:var(--white);}

/* FEATURED */
.featured{margin:0 20px 16px;border-radius:24px;overflow:hidden;position:relative;height:280px;cursor:pointer;box-shadow:0 8px 32px rgba(29,158,117,.15);}
.featured img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;}
.featured:hover img{transform:scale(1.04);}
.featured-overlay{position:absolute;inset:0;background:linear-gradient(160deg,transparent 30%,rgba(20,14,8,.75) 100%);}
.feat-label{position:absolute;top:16px;left:16px;background:var(--teal);color:white;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 12px;border-radius:99px;}
.feat-emoji{position:absolute;top:16px;right:16px;font-size:34px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25));}
.feat-body{position:absolute;bottom:0;left:0;right:0;padding:20px;}
.feat-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
.ftag{padding:4px 10px;border-radius:99px;background:rgba(255,255,255,.18);backdrop-filter:blur(4px);color:rgba(255,255,255,.92);font-size:11px;font-weight:500;}
.feat-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:white;line-height:1.2;text-shadow:0 1px 6px rgba(0,0,0,.3);}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;padding:4px 20px 10px;}
.sec-title{font-family:'Lora',serif;font-size:18px;font-weight:600;}
.sec-sub{font-size:12px;color:var(--text-muted);}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;}
.card{background:var(--white);border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 2px 12px rgba(44,40,32,.07);transition:transform .25s,box-shadow .25s;animation:fadeUp .35s ease both;}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(44,40,32,.13);}
.card.wide{grid-column:span 2;}
.card-img-wrap{overflow:hidden;position:relative;}
.card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;transition:transform .4s;}
.card:hover .card-img{transform:scale(1.06);}
.card.wide .card-img{aspect-ratio:16/7;}
.card-emoji{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,var(--teal-light),var(--cream));}
.card.wide .card-emoji{aspect-ratio:16/7;}
.cbadge{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border-radius:99px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--teal);}
.card-body{padding:10px 12px 12px;}
.card-cuisine{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--teal);margin-bottom:3px;}
.card-title{font-family:'Lora',serif;font-size:13px;font-weight:600;line-height:1.3;margin-bottom:5px;}
.card.wide .card-title{font-size:15px;}
.card-meta{display:flex;gap:8px;}
.cmeta{font-size:11px;color:var(--text-muted);}

/* LIST */
.list-view{display:flex;flex-direction:column;gap:8px;padding:0 20px;}
.lcard{display:flex;gap:12px;align-items:center;background:var(--white);border-radius:16px;padding:12px;cursor:pointer;box-shadow:0 2px 8px rgba(44,40,32,.05);transition:all .2s;animation:fadeUp .3s ease both;}
.lcard:hover{box-shadow:0 6px 20px rgba(44,40,32,.1);}
.lthumb{width:60px;height:60px;border-radius:12px;object-fit:cover;flex-shrink:0;}
.lemoji{width:60px;height:60px;border-radius:12px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.linfo{flex:1;min-width:0;}
.ltitle{font-family:'Lora',serif;font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lmeta{font-size:11px;color:var(--text-muted);}
.lbudget{font-size:13px;font-weight:700;color:var(--teal);flex-shrink:0;}

/* EMPTY/LOAD */
.loading{text-align:center;padding:60px 20px;color:var(--text-muted);}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
.empty{text-align:center;padding:60px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-family:'Lora',serif;font-size:18px;font-weight:600;margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--text-muted);}

/* NAV */
.fnav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-radius:99px;padding:10px 8px;display:flex;gap:2px;box-shadow:0 8px 40px rgba(44,40,32,.20);z-index:100;border:1px solid rgba(229,221,213,.5);}
.fnb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 14px;border:none;border-radius:99px;background:transparent;cursor:pointer;transition:all .2s;min-width:52px;}
.fi{font-size:20px;line-height:1;}
.fl{font-size:9px;font-weight:600;color:var(--text-muted);}
.fnb.active{background:var(--teal);}
.fnb.active .fl{color:rgba(255,255,255,.9);}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--white);padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="brand">Livre de <span>Recettes</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="count-chip" id="countChip">…</span>
      <div class="view-toggle">
        <button class="vbtn on" id="btnG" onclick="setView('grid')" title="Grille">⊞</button>
        <button class="vbtn" id="btnL" onclick="setView('list')" title="Liste">☰</button>
      </div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Rechercher…" oninput="onSearch()"/>
  </div>
  <div class="filters" id="filtersBar"></div>
</div>

<div id="mainContent">
  <div class="loading"><div class="spin"></div><div>Chargement des recettes…</div></div>
</div>

<nav class="fnav">
  <button class="fnb" onclick="goTo('semainier.html')"><div class="fi">📅</div><div class="fl">Semaine</div></button>
  <button class="fnb active" onclick="goTo('livre.html')"><div class="fi">📖</div><div class="fl">Recettes</div></button>
  <button class="fnb" onclick="goTo('courses.html')"><div class="fi">🛒</div><div class="fl">Courses</div></button>
  <button class="fnb" onclick="goTo('inventaire.html')"><div class="fi">📦</div><div class="fl">Stock</div></button>
  <button class="fnb" onclick="goTo('profil.html')"><div class="fi">👤</div><div class="fl">Profil</div></button>
</nav>

<script>
const SUPABASE_URL='https://vquwacvjfpolqtyxydqw.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdXdhY3ZqZnBvbHF0eXh5ZHF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTk5NTEsImV4cCI6MjA5MjI5NTk1MX0.-Nqkk96nby_SObo_Vrq-OSiD0zXnke42IbiVtVbyOP4';
let all=[],filtered=[],filtre='Toutes',query='',view='grid';
function goTo(u){window.location.href=u;}
function hesc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function charger(){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/recettes?select=id,titre,description,emoji,budget,difficulte,saisons,moments,url_image,prep_time,cook_time,total_time,ingredients&order=created_at.desc&limit=500',
      {headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    if(!r.ok)throw new Error();
    const data=await r.json();
    const avecImg=data.filter(r=>r.url_image),sansImg=data.filter(r=>!r.url_image);
    all=[...avecImg,...sansImg];
  }catch(e){
    try{const r=await fetch('recettes.json');const data=await r.json();
      all=data.map(r=>({id:r.id,titre:r.titre,description:r.description,emoji:r.ux?.emoji||'🍽️',budget:r.tags?.budget,difficulte:r.tags?.difficulte,saisons:r.tags?.saison||[],url_image:null,total_time:r.metrics?.total_time,ingredients:r.ingredients||[]}));
    }catch(e2){document.getElementById('mainContent').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Impossible de charger</div></div>';return;}
  }
  buildFilters();applyFilters();
}

function buildFilters(){
  const saisons=[...new Set(all.flatMap(r=>r.saisons||[]).filter(Boolean))];
  const avecImg=all.filter(r=>r.url_image).length;
  document.getElementById('filtersBar').innerHTML=
    `<button class="fbtn on" onclick="setF('Toutes')">Toutes (${all.length})</button>`+
    (avecImg?`<button class="fbtn" onclick="setF('📷')">📷 Avec photo (${avecImg})</button>`:'') +
    saisons.map(s=>`<button class="fbtn" onclick="setF('${hesc(s)}')">${si(s)} ${hesc(s)}</button>`).join('')+
    ['€','€€','€€€'].map(b=>`<button class="fbtn" onclick="setF('${b}')">${b}</button>`).join('');
}
function si(s){return{Été:'☀️',Hiver:'❄️',Printemps:'🌸',Automne:'🍂'}[s]||'🌿';}
function setF(f){
  filtre=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b.textContent.trim().startsWith(f)||(f==='Toutes'&&b.textContent.includes('Toutes'))));
  applyFilters();
}
function onSearch(){query=document.getElementById('searchInput').value.toLowerCase();applyFilters();}
function applyFilters(){
  let r=[...all];
  if(filtre==='📷')r=r.filter(x=>x.url_image);
  else if(['€','€€','€€€'].includes(filtre))r=r.filter(x=>x.budget===filtre);
  else if(filtre!=='Toutes')r=r.filter(x=>(x.saisons||[]).includes(filtre));
  if(query)r=r.filter(x=>x.titre.toLowerCase().includes(query)||(x.description||'').toLowerCase().includes(query));
  filtered=r;
  document.getElementById('countChip').textContent=r.length+' recette'+(r.length>1?'s':'');
  render();
}

function setView(v){view=v;document.getElementById('btnG').classList.toggle('on',v==='grid');document.getElementById('btnL').classList.toggle('on',v==='list');render();}

function render(){
  const el=document.getElementById('mainContent');
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-title">Aucune recette</div><div class="empty-sub">Modifiez votre recherche ou filtre.</div></div>`;return;}
  if(view==='list'){renderList(el);return;}
  renderGrid(el);
}

function renderGrid(el){
  let html='';
  const star=!query&&filtered.find(r=>r.url_image);
  if(star){
    html+=`<div class="featured" onclick="open_('${hesc(star.id)}')">
      <img src="${hesc(star.url_image)}" alt="${hesc(star.titre)}" onerror="this.parentElement.style.background='var(--teal)';this.style.display='none'"/>
      <div class="featured-overlay"></div>
      <div class="feat-label">⭐ À la une</div>
      <div class="feat-emoji">${star.emoji||'🍽️'}</div>
      <div class="feat-body">
        <div class="feat-tags">
          ${star.total_time?`<span class="ftag">⏱ ${star.total_time} min</span>`:''}
          ${star.budget?`<span class="ftag">${star.budget}</span>`:''}
          ${star.difficulte?`<span class="ftag">${star.difficulte}</span>`:''}
        </div>
        <div class="feat-title">${hesc(star.titre)}</div>
      </div>
    </div>`;
  }
  const reste=star&&!query?filtered.filter(r=>r.id!==star.id):filtered;
  if(reste.length){
    html+=`<div class="sec-hd"><div class="sec-title">${query?'Résultats':'Toutes les recettes'}</div><div class="sec-sub">${reste.length}</div></div>`;
    html+=`<div class="grid">`;
    reste.forEach((r,i)=>{
      const wide=!r.url_image&&i%7===0;
      const delay=(i%10)*40;
      const img=r.url_image
        ?`<div class="card-img-wrap"><img class="card-img" src="${hesc(r.url_image)}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-emoji\\'>${r.emoji||'🍽️'}</div>'"/><span class="cbadge">${r.budget||'€€'}</span></div>`
        :`<div class="card-emoji${wide?' wide':''}">${r.emoji||'🍽️'}</div>`;
      html+=`<div class="card${wide?' wide':''}" style="animation-delay:${delay}ms" onclick="open_('${hesc(r.id)}')">
        ${img}
        <div class="card-body">
          <div class="card-cuisine">${(r.saisons||[]).join(' · ')||'Toutes saisons'}</div>
          <div class="card-title">${hesc(r.titre)}</div>
          <div class="card-meta">${r.total_time?`<span class="cmeta">⏱ ${r.total_time} min</span>`:''} ${r.difficulte?`<span class="cmeta">· ${r.difficulte}</span>`:''}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

function renderList(el){
  let html=`<div style="height:8px"></div><div class="list-view">`;
  filtered.forEach((r,i)=>{
    const thumb=r.url_image?`<img class="lthumb" src="${hesc(r.url_image)}" loading="lazy" onerror="this.outerHTML='<div class=\\'lemoji\\'>${r.emoji||'🍽️'}</div>'">`:`<div class="lemoji">${r.emoji||'🍽️'}</div>`;
    html+=`<div class="lcard" style="animation-delay:${(i%15)*25}ms" onclick="open_('${hesc(r.id)}')">
      ${thumb}
      <div class="linfo"><div class="ltitle">${hesc(r.titre)}</div><div class="lmeta">${r.total_time?'⏱ '+r.total_time+' min · ':''}${r.difficulte||''}</div></div>
      <div class="lbudget">${r.budget||'€€'}</div>
    </div>`;
  });
  html+='</div>';el.innerHTML=html;
}

async function open_(id){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/recettes?id=eq.'+encodeURIComponent(id)+'&select=*',{headers:{apikey:SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const data=await r.json();
    if(data&&data[0]){
      const rec=data[0];
      sessionStorage.setItem('clara_recette_courante',JSON.stringify({
        id:rec.id,titre:rec.titre,description:rec.description,personnes:rec.personnes||4,
        ingredients:rec.ingredients||[],etapes:rec.etapes||[],url_image:rec.url_image||null,
        tags:{saison:rec.saisons||[],budget:rec.budget,difficulte:rec.difficulte,moments:rec.moments||[],allergenes:rec.allergenes||[]},
        metrics:{prep_time:rec.prep_time||0,cook_time:rec.cook_time||0,total_time:rec.total_time||0},
        ux:{emoji:rec.emoji||'🍽️',mood:rec.mood||''}
      }));
      const p=localStorage.getItem('clara_profile');
      sessionStorage.setItem('clara_nb_personnes',p?JSON.parse(p).nb_personnes||2:2);
      goTo('recette.html');return;
    }
  }catch(e){}
  const r=all.find(x=>String(x.id)===String(id));
  if(r){sessionStorage.setItem('clara_recette_courante',JSON.stringify(r));goTo('recette.html');}
}

charger();
</script>
</body>
</html>
